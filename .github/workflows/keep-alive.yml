name: 🔁 Keep Render Backend Alive

on:
  schedule:
    - cron: '*/5 * * * *'
  workflow_dispatch:

jobs:
  ping:
    name: Ping RiskCare Backend
    runs-on: ubuntu-latest
    steps:
      - name: Ping /health endpoint
        run: |
          echo "Pinging riskcarehrms.onrender.com/health ..."
          STATUS=$(curl -o /dev/null -s -w "%{http_code}" https://riskcarehrms.onrender.com/health)
          echo "Response status: $STATUS"
          if [ "$STATUS" -eq 200 ]; then
            echo "✅ Server is alive!"
          else
            echo "⚠️ Server returned status $STATUS"
          fi
