<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"><meta name="viewport" content="width=device-width,initial-scale=1">
<title id="page-title">Documents</title>
<script src="config.js"></script>
<link href="https://fonts.googleapis.com/css2?family=DM+Sans:ital,opsz,wght@0,9..40,300;0,9..40,400;0,9..40,500;0,9..40,600;0,9..40,700;0,9..40,800;1,9..40,400&display=swap" rel="stylesheet">
<link rel="stylesheet" href="style.css">
<style>
/* ── Page-level card override so autocomplete dropdown isn't clipped ── */
.content .card { overflow: visible; }

/* ── Tabs ── */
.doc-tabs { display:flex;gap:6px;flex-wrap:wrap;margin-bottom:18px }
.doc-tab-btn {
  padding:9px 20px;border-radius:8px;border:1.5px solid #c5cae9;background:#fff;
  font-size:13px;font-weight:600;color:#3949ab;cursor:pointer;transition:all .15s;
}
.doc-tab-btn.active { background:#3949ab;color:#fff;border-color:#3949ab;box-shadow:0 2px 8px rgba(57,73,171,.18); }
.doc-tab-btn:not(.active):hover { background:#e8eaf6; }

/* ── HR Search Bar ── */
.hr-search-bar { position:relative }
.hr-search-input { width:100%;max-width:400px;padding:9px 14px;border-radius:8px;border:1.5px solid #c5cae9;font-size:13px;font-family:inherit;outline:none;transition:border-color .15s }
.hr-search-input:focus { border-color:#3949ab }
.hr-search-dropdown {
  position:absolute;top:calc(100% + 4px);left:0;width:100%;max-width:400px;
  background:#fff;border:1.5px solid #9fa8da;border-radius:8px;
  box-shadow:0 6px 24px rgba(0,0,0,.13);z-index:9999;
  max-height:240px;overflow-y:auto;display:none
}
.hr-search-dropdown.open { display:block }
.hr-search-option { padding:10px 14px;cursor:pointer;font-size:12.5px;border-bottom:1px solid #f0f2f8 }
.hr-search-option:last-child { border-bottom:none }
.hr-search-option:hover { background:#e8eaf6 }
.hr-selected-badge {
  display:inline-flex;align-items:center;gap:8px;background:#e8eaf6;
  border:1px solid #9fa8da;border-radius:20px;padding:5px 12px;font-size:12px;
  font-weight:600;color:#283593
}
.hr-selected-badge .badge-clear { cursor:pointer;color:#90a4ae;font-size:15px;line-height:1 }
.hr-selected-badge .badge-clear:hover { color:#c62828 }

/* ── Documents Table ── */
.doc-table-wrap { border-radius:10px;overflow:hidden;border:1px solid #9fa8da }
.doc-table { width:100%;border-collapse:collapse;min-width:960px;table-layout:fixed }
.doc-table col.col-doc  { width:26% }
.doc-table col.col-sub  { width:11% }
.doc-table col.col-add  { width:20% }
.doc-table col.col-att  { width:24% }
.doc-table col.col-date { width:19% }
.doc-table th {
  background:#3949ab;color:#fff;font-size:11.5px;font-weight:700;
  letter-spacing:.03em;padding:11px 14px;text-align:center;white-space:nowrap;border:1px solid #5c6bc0
}
.doc-table th:first-child { text-align:left }
.doc-table td { border:1px solid #e0e3ec;padding:11px 14px;font-size:12.5px;vertical-align:middle;text-align:center;background:#fff }
.doc-table tr:hover td { background:#e8eaf6 }
.doc-table td:first-child { word-break:break-word;text-align:left }

/* ── Group Header Rows ── */
.doc-group-broker   td { background:#1b5e20 !important;color:#fff;font-size:12px;font-weight:800;padding:9px 14px;letter-spacing:.04em;text-align:center !important }
.doc-group-identity td { background:#bf360c !important;color:#fff;font-size:12px;font-weight:800;padding:9px 14px;letter-spacing:.04em;text-align:center !important }
.doc-group-edu      td { background:#4a148c !important;color:#fff;font-size:12px;font-weight:800;padding:9px 14px;letter-spacing:.04em;text-align:center !important }
.doc-group-finance  td { background:#0d47a1 !important;color:#fff;font-size:12px;font-weight:800;padding:9px 14px;letter-spacing:.04em;text-align:center !important }
.doc-group-employ   td { background:#b71c1c !important;color:#fff;font-size:12px;font-weight:800;padding:9px 14px;letter-spacing:.04em;text-align:center !important }
.doc-group-other    td { background:#37474f !important;color:#fff;font-size:12px;font-weight:800;padding:9px 14px;letter-spacing:.04em;text-align:center !important }

.doc-status-ok    { display:inline-flex;align-items:center;gap:5px;color:#1b5e20;font-weight:700;font-size:11.5px;background:#e8f5e9;border:1px solid #a5d6a7;padding:3px 10px;border-radius:6px }
.doc-status-empty { display:inline-flex;align-items:center;gap:4px;color:#78909c;font-weight:600;font-size:11.5px;background:#eceff1;border:1px solid #cfd8dc;padding:3px 10px;border-radius:6px }
.doc-file-cell { display:flex;flex-direction:column;align-items:center;gap:4px }
.pending-badge { font-size:10.5px;color:#283593;background:#e8eaf6;border:1px solid #9fa8da;border-radius:6px;padding:3px 8px;margin-top:3px;max-width:170px;overflow:hidden;text-overflow:ellipsis;white-space:nowrap;font-weight:600 }
.attach-list { display:flex;flex-direction:column;gap:5px;align-items:center }
.attach-chip { display:inline-flex;align-items:center;gap:6px;background:#e8f5e9;border:1px solid #a5d6a7;border-radius:6px;padding:4px 10px 4px 9px;font-size:11px;color:#1b5e20;cursor:pointer;transition:background .15s;max-width:175px;font-weight:600 }
.attach-chip:hover { background:#c8e6c9 }
.attach-chip-name { overflow:hidden;text-overflow:ellipsis;white-space:nowrap;max-width:115px }
.attach-chip-del { margin-left:2px;color:#90a4ae;cursor:pointer;font-size:13px;line-height:1;flex-shrink:0;padding:0 2px }
.attach-chip-del:hover { color:#c62828 }
.datetime-cell { display:flex;flex-direction:column;align-items:center;gap:2px }
.datetime-date { font-size:12px;font-weight:700;color:#283593 }
.datetime-time { font-size:11px;color:#5c6bc0;font-weight:600 }

/* ── Employment & Qualification Cards ── */
.rec-cards { display:flex;flex-direction:column;gap:12px;margin-bottom:16px }
.rec-card {
  border:1.5px solid #e0e3ec;border-radius:10px;padding:16px 18px;background:#fff;
  display:flex;justify-content:space-between;align-items:flex-start;gap:12px
}
.rec-card:hover { border-color:#9fa8da;box-shadow:0 2px 8px rgba(57,73,171,.08) }
.rec-card-body { flex:1;min-width:0 }
.rec-card-title { font-size:14px;font-weight:700;color:#283593;margin-bottom:4px }
.rec-card-sub { font-size:12px;color:#546e7a;margin-bottom:6px }
.rec-card-tags { display:flex;flex-wrap:wrap;gap:6px }
.rec-tag { font-size:11px;background:#e8eaf6;color:#3949ab;border-radius:6px;padding:2px 8px;font-weight:600 }
.rec-card-actions { display:flex;gap:7px;flex-shrink:0 }

/* ── Inline Form (always visible, not slide) ── */
.inline-form-box {
  border:1.5px solid #9fa8da;border-radius:12px;background:#f5f6fb;
  padding:22px 24px;margin-bottom:20px
}
.inline-form-box h4 { font-size:15px;font-weight:700;color:#283593;margin:0 0 16px }
.form-grid-2 { display:grid;grid-template-columns:1fr 1fr;gap:14px 18px }
.form-grid-3 { display:grid;grid-template-columns:1fr 1fr 1fr;gap:14px 18px }
@media(max-width:700px){ .form-grid-2,.form-grid-3 { grid-template-columns:1fr } }
.form-section-label {
  font-size:11px;font-weight:800;color:#3949ab;letter-spacing:.06em;text-transform:uppercase;
  margin:16px 0 10px;padding-bottom:4px;border-bottom:1px solid #c5cae9
}
.inline-form-box .form-label { font-size:12px;font-weight:600;color:#455a64 }
.inline-form-box .form-control { font-size:13px }
.form-btn-row { display:flex;gap:10px;margin-top:20px;justify-content:flex-end }
.form-check-row { display:flex;align-items:center;gap:8px;font-size:13px;font-weight:500;color:#37474f;margin-top:6px;cursor:pointer }
.form-check-row input[type=checkbox] { width:15px;height:15px;accent-color:#3949ab }

/* ── Attachment Viewer Modal ── */
.modal-overlay{display:none;position:fixed;inset:0;background:rgba(0,0,0,.45);z-index:1000;align-items:center;justify-content:center}
.modal-overlay.open{display:flex}
.modal-box{background:#fff;border-radius:16px;width:min(640px,95vw);max-height:90vh;overflow-y:auto;padding:24px;box-shadow:0 8px 40px rgba(0,0,0,.2)}
.modal-box h3{font-size:17px;font-weight:700;margin-bottom:16px;color:#1b4332}
.modal-close{float:right;background:none;border:none;font-size:22px;cursor:pointer;color:#888;margin-top:-4px}
.viewer-frame{width:100%;height:70vh;border:none;border-radius:8px;background:#f0f0f0}
</style>
</head>
<body>
<div class="sidebar-overlay" id="sidebar-overlay" onclick="closeSidebar()"></div>
<aside class="sidebar">
  <div class="sidebar-logo">
    <div class="logo-mark" id="sidebar-logo-mark">
      <svg class="logo-mark-icon" viewBox="0 0 24 24"><path d="M12 2L2 7l10 5 10-5-10-5zM2 17l10 5 10-5M2 12l10 5 10-5"/></svg>
    </div>
    <div><div class="logo-text-wrap"><div class="logo-text" id="sidebar-logo-text"></div></div></div>
  </div>
  <nav id="sidebar-nav"></nav>
  <div class="sidebar-footer">
    <div id="sidebar-user"></div>
    <button class="logout-btn" onclick="Auth.logout()">
      <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"><path d="M9 21H5a2 2 0 0 1-2-2V5a2 2 0 0 1 2-2h4"/><polyline points="16,17 21,12 16,7"/><line x1="21" y1="12" x2="9" y2="12"/></svg>
      Sign Out
    </button>
  </div>
</aside>

<div class="main">
  <div class="topbar">
    <div class="topbar-left">
      <button class="hamburger-btn" onclick="toggleSidebar()"><span></span><span></span><span></span></button>
      <div class="topbar-title">📄 Documents</div>
    </div>
    <div class="topbar-right">
      <button class="btn btn-outline btn-sm" onclick="refreshCurrentTab()">🔄 Refresh</button>
      <button id="notif-bell-btn" class="topbar-icon-btn notif-btn" title="Notifications">🔔<span id="notif-badge"></span></button>
      <a class="topbar-icon-btn" href="dashboard.html" title="Dashboard">🏠</a>
    </div>
  </div>

  <div class="content fade-in">
    <div class="card">

      <!-- ── HR Search ── -->
      <div id="hr-search-section" style="display:none;margin-bottom:18px">
        <div style="font-size:11px;font-weight:700;color:var(--muted);letter-spacing:.04em;margin-bottom:8px">VIEWING DOCUMENTS FOR:</div>
        <div style="display:flex;align-items:center;flex-wrap:wrap;gap:10px">
          <div class="hr-search-bar">
            <input id="hr-search-input" class="hr-search-input" placeholder="🔍 Type name or employee code…"
              autocomplete="off" oninput="onSearchInput()" onfocus="showDropdown()" onblur="hideDropdownDelayed()">
            <div id="hr-search-dropdown" class="hr-search-dropdown"></div>
          </div>
          <div id="hr-selected-badge" style="display:none">
            <span class="hr-selected-badge">
              <span id="hr-selected-label"></span>
              <span class="badge-clear" onclick="clearEmployeeSelection()" title="Clear">×</span>
            </span>
          </div>
          <div id="zip-btn-wrap" style="display:none">
            <button class="btn btn-outline btn-sm" onclick="downloadZip()" title="Download all documents + Excel sheets as ZIP">⬇️ Download ZIP</button>
          </div>
        </div>
      </div>

      <!-- ── Tabs ── -->
      <div class="doc-tabs">
        <button class="doc-tab-btn active" id="tab-btn-documents"  onclick="switchDocTab('documents')">📄 Documents</button>
        <button class="doc-tab-btn"        id="tab-btn-employment" onclick="switchDocTab('employment')">🏢 Previous Employment</button>
        <button class="doc-tab-btn"        id="tab-btn-quals"      onclick="switchDocTab('quals')">🎓 Qualifications</button>
      </div>

      <!-- ═══════ TAB 1: Documents ═══════ -->
      <div id="tab-documents">
        <div id="table-wrap"><div class="loader"><div class="spinner"></div></div></div>
        <div style="margin-top:18px;display:flex;justify-content:flex-end">
          <button class="btn btn-primary" id="save-btn" onclick="saveAll()">💾 Save</button>
        </div>
      </div>

      <!-- ═══════ TAB 2: Previous Employment ═══════ -->
      <div id="tab-employment" style="display:none">

        <!-- Always-visible form -->
        <div class="inline-form-box" id="emp-form-box">
          <h4 id="emp-form-title">➕ Add Employment</h4>
          <input type="hidden" id="ef-id">
          <div class="form-grid-2">
            <div class="form-group">
              <label class="form-label">Company Name *</label>
              <input type="text" id="ef-company" class="form-control" placeholder="Company Ltd.">
            </div>
            <div class="form-group">
              <label class="form-label">Designation</label>
              <input type="text" id="ef-designation" class="form-control" placeholder="Software Engineer">
            </div>
            <div class="form-group">
              <label class="form-label">From Date</label>
              <input type="date" id="ef-from" class="form-control">
            </div>
            <div class="form-group">
              <label class="form-label">To Date</label>
              <input type="date" id="ef-to" class="form-control">
            </div>
            <div class="form-group">
              <label class="form-label">Job Type</label>
              <select id="ef-jobtype" class="form-control">
                <option value="Full Time">Full Time</option>
                <option value="Part Time">Part Time</option>
                <option value="Contract">Contract</option>
                <option value="Internship">Internship</option>
              </select>
            </div>
            <div class="form-group">
              <label class="form-label">PF Number</label>
              <input type="text" id="ef-pf" class="form-control" placeholder="PF / UAN number">
            </div>
            <div class="form-group">
              <label class="form-label">City</label>
              <input type="text" id="ef-city" class="form-control" placeholder="Mumbai">
            </div>
            <div class="form-group">
              <label class="form-label">State</label>
              <input type="text" id="ef-state" class="form-control" placeholder="Maharashtra">
            </div>
          </div>

          <div class="form-section-label">Previous Manager</div>
          <div class="form-grid-3">
            <div class="form-group">
              <label class="form-label">Name</label>
              <input type="text" id="ef-mgr-name" class="form-control" placeholder="Full Name">
            </div>
            <div class="form-group">
              <label class="form-label">Phone</label>
              <input type="tel" id="ef-mgr-phone" class="form-control" placeholder="+91 …">
            </div>
            <div class="form-group">
              <label class="form-label">Email</label>
              <input type="email" id="ef-mgr-email" class="form-control" placeholder="manager@company.com">
            </div>
          </div>

          <div class="form-section-label">Previous HR</div>
          <div class="form-grid-3">
            <div class="form-group">
              <label class="form-label">Name</label>
              <input type="text" id="ef-hr-name" class="form-control" placeholder="Full Name">
            </div>
            <div class="form-group">
              <label class="form-label">Phone</label>
              <input type="tel" id="ef-hr-phone" class="form-control" placeholder="+91 …">
            </div>
            <div class="form-group">
              <label class="form-label">Email</label>
              <input type="email" id="ef-hr-email" class="form-control" placeholder="hr@company.com">
            </div>
          </div>

          <div class="form-section-label">Additional Details</div>
          <div class="form-group">
            <label class="form-label">Company Address</label>
            <textarea id="ef-address" class="form-control" rows="2" placeholder="Full address…"></textarea>
          </div>
          <div class="form-group" style="margin-top:14px">
            <label class="form-label">Reason for Leaving</label>
            <textarea id="ef-reason" class="form-control" rows="2" placeholder="Reason for leaving…"></textarea>
          </div>
          <div style="display:flex;gap:28px;margin-top:12px">
            <label class="form-check-row"><input type="checkbox" id="ef-overseas"> Overseas</label>
            <label class="form-check-row"><input type="checkbox" id="ef-relevant"> Is Relevant</label>
          </div>
          <div class="form-btn-row">
            <button class="btn btn-outline btn-sm" onclick="resetEmpForm()">✕ Clear</button>
            <button class="btn btn-primary btn-sm" onclick="saveEmployment()">💾 Save Employment</button>
          </div>
        </div>

        <!-- Saved records list -->
        <div id="emp-records"></div>
      </div>

      <!-- ═══════ TAB 3: Qualifications ═══════ -->
      <div id="tab-quals" style="display:none">

        <!-- Always-visible form -->
        <div class="inline-form-box" id="qual-form-box">
          <h4 id="qual-form-title">➕ Add Qualification</h4>
          <input type="hidden" id="qf-id">
          <div class="form-grid-2">
            <div class="form-group">
              <label class="form-label">Qualification *</label>
              <select id="qf-qual" class="form-control">
                <option value="">— Select —</option>
                <option>10th</option><option>12th</option><option>Diploma</option>
                <option>Bachelor's</option><option>Master's</option><option>PhD</option>
                <option>Certification</option><option>Other</option>
              </select>
            </div>
            <div class="form-group">
              <label class="form-label">Degree</label>
              <input type="text" id="qf-degree" class="form-control" placeholder="B.Tech / MBA …">
            </div>
            <div class="form-group">
              <label class="form-label">Specialization</label>
              <input type="text" id="qf-spec" class="form-control" placeholder="Computer Science …">
            </div>
            <div class="form-group">
              <label class="form-label">Institute Name *</label>
              <input type="text" id="qf-institute" class="form-control" placeholder="University / College …">
            </div>
            <div class="form-group">
              <label class="form-label">Board / University</label>
              <input type="text" id="qf-board" class="form-control" placeholder="CBSE / Mumbai University …">
            </div>
            <div class="form-group">
              <label class="form-label">Mode of Education</label>
              <select id="qf-mode" class="form-control">
                <option value="">— Select —</option>
                <option>Regular</option><option>Distance</option>
                <option>Online</option><option>Part Time</option>
              </select>
            </div>
            <div class="form-group">
              <label class="form-label">State / Location</label>
              <input type="text" id="qf-state" class="form-control" placeholder="Maharashtra">
            </div>
            <div class="form-group">
              <label class="form-label">Grade / %</label>
              <input type="text" id="qf-grade" class="form-control" placeholder="8.5 CGPA / 85%">
            </div>
            <div class="form-group">
              <label class="form-label">Passing Month</label>
              <select id="qf-month" class="form-control">
                <option value="">— Month —</option>
                <option value="1">January</option><option value="2">February</option>
                <option value="3">March</option><option value="4">April</option>
                <option value="5">May</option><option value="6">June</option>
                <option value="7">July</option><option value="8">August</option>
                <option value="9">September</option><option value="10">October</option>
                <option value="11">November</option><option value="12">December</option>
              </select>
            </div>
            <div class="form-group">
              <label class="form-label">Passing Year</label>
              <select id="qf-year" class="form-control">
                <option value="">— Year —</option>
              </select>
            </div>
          </div>
          <div class="form-group" style="margin-top:4px">
            <label class="form-label">Academic Achievements</label>
            <textarea id="qf-achievements" class="form-control" rows="2" placeholder="Gold Medal, Rank 1 …"></textarea>
          </div>
          <div class="form-group" style="margin-top:14px">
            <label class="form-label">Remarks</label>
            <textarea id="qf-remarks" class="form-control" rows="2" placeholder="Any additional notes …"></textarea>
          </div>
          <div style="margin-top:12px">
            <label class="form-check-row"><input type="checkbox" id="qf-highest"> Highest Qualification</label>
          </div>
          <div class="form-btn-row">
            <button class="btn btn-outline btn-sm" onclick="resetQualForm()">✕ Clear</button>
            <button class="btn btn-primary btn-sm" onclick="saveQualification()">💾 Save Qualification</button>
          </div>
        </div>

        <!-- Saved records list -->
        <div id="qual-records"></div>
      </div>

    </div><!-- .card -->
  </div>
</div>

<!-- ── Attachment Viewer Modal ── -->
<div class="modal-overlay" id="viewerModal">
  <div class="modal-box">
    <button class="modal-close" onclick="closeModal('viewerModal')">×</button>
    <h3 id="viewerTitle">Attachment</h3>
    <div id="viewerBody"></div>
  </div>
</div>

<script src="app.js"></script>
<script>
Auth.guard();

const HR_ROLES = ['hr','admin','super_admin'];
let isHR = false;
let currentEmployeeId = null;
let checklistData = [];
let pendingFiles   = {};
let allEmployees   = [];
let currentTab     = 'documents';

/* ── Populate year dropdown ── */
(function(){
  const sel = document.getElementById('qf-year');
  const yr  = new Date().getFullYear();
  for (let y = yr; y >= yr - 35; y--) {
    const o = document.createElement('option');
    o.value = y; o.textContent = y; sel.appendChild(o);
  }
})();

window.addEventListener('load', async () => {
  buildSidebar('documents.html');
  const user = Auth.getUser();
  isHR = HR_ROLES.includes(user.role);
  currentEmployeeId = isHR ? null : user.id;  // HR: no selection until they pick someone

  if (isHR) {
    document.getElementById('hr-search-section').style.display = 'block';
    loadAllEmployees();
  }

  if (currentEmployeeId) {
    loadDocuments();
    loadEmploymentRecords();
    loadQualificationRecords();
  } else {
    showEmptyPicker();
  }
});

// ══════════════════════════════════════════════════════════════════════════════
// TAB SWITCHING
// ══════════════════════════════════════════════════════════════════════════════
function switchDocTab(name) {
  currentTab = name;
  ['documents','employment','quals'].forEach(t => {
    document.getElementById('tab-' + t).style.display = (t === name) ? '' : 'none';
    document.getElementById('tab-btn-' + t).classList.toggle('active', t === name);
  });
}

function refreshCurrentTab() {
  if (currentTab === 'documents')  loadDocuments();
  if (currentTab === 'employment') loadEmploymentRecords();
  if (currentTab === 'quals')      loadQualificationRecords();
}

// ══════════════════════════════════════════════════════════════════════════════
// HR EMPLOYEE SEARCH
// ══════════════════════════════════════════════════════════════════════════════
async function loadAllEmployees() {
  const res = await api('GET', '/employees');
  if (res?.success) allEmployees = res.data || [];
}

function showEmptyPicker() {
  const ph = `<div class="empty-state" style="padding:60px 24px">
    <div class="empty-icon">🔍</div>
    <p style="color:var(--muted);font-size:14px">Search and select an employee above to view their documents.</p>
  </div>`;
  document.getElementById('table-wrap').innerHTML = ph;
  document.getElementById('emp-records').innerHTML   = ph;
  document.getElementById('qual-records').innerHTML  = ph;
}

function onSearchInput() {
  const q  = document.getElementById('hr-search-input').value.trim().toLowerCase();
  const dd = document.getElementById('hr-search-dropdown');
  if (!q) { dd.classList.remove('open'); return; }
  const matches = allEmployees.filter(e =>
    (e.first_name + ' ' + e.last_name).toLowerCase().includes(q) ||
    (e.employee_code || '').toLowerCase().includes(q)
  ).slice(0, 10);
  if (!matches.length) {
    dd.innerHTML = '<div class="hr-search-option" style="color:#90a4ae">No results found</div>';
    dd.classList.add('open'); return;
  }
  dd.innerHTML = matches.map(e =>
    `<div class="hr-search-option" onmousedown="selectEmployee(${e.id},'${escAttr(e.employee_code)} — ${escAttr(e.first_name)} ${escAttr(e.last_name)}')">${e.employee_code} — ${e.first_name} ${e.last_name}</div>`
  ).join('');
  dd.classList.add('open');
}

function showDropdown() {
  if (document.getElementById('hr-search-input').value.trim()) onSearchInput();
}
function hideDropdownDelayed() {
  setTimeout(() => document.getElementById('hr-search-dropdown').classList.remove('open'), 150);
}

function selectEmployee(id, label) {
  currentEmployeeId = id;
  document.getElementById('hr-search-input').value = '';
  document.getElementById('hr-search-dropdown').classList.remove('open');
  document.getElementById('hr-selected-label').textContent = label;
  document.getElementById('hr-selected-badge').style.display = '';
  document.getElementById('zip-btn-wrap').style.display = '';
  pendingFiles = {};
  resetEmpForm();
  resetQualForm();
  loadDocuments();
  loadEmploymentRecords();
  loadQualificationRecords();
}

function clearEmployeeSelection() {
  currentEmployeeId = null;
  document.getElementById('hr-selected-badge').style.display  = 'none';
  document.getElementById('hr-selected-label').textContent    = '';
  document.getElementById('hr-search-input').value            = '';
  document.getElementById('zip-btn-wrap').style.display       = 'none';
  pendingFiles = {};
  resetEmpForm();
  resetQualForm();
  showEmptyPicker();
}

// ══════════════════════════════════════════════════════════════════════════════
// TAB 1 – DOCUMENTS  (group keys match documentsController.js exactly)
// ══════════════════════════════════════════════════════════════════════════════
const DOC_GROUPS = [
  { keys:['resume'] },
  { keys:['broker_qual_renewal','broker_training'] },
  { keys:['aadhaar_card','pan_card','id_residence_proof','passport_dl_voterid'] },
  { keys:['tenth_marksheet','twelfth_marksheet','graduation_marksheet','post_graduation_cert'] },
  { keys:['last3_payslips','bank_statement_salary','uan_pf_document'] },
  { keys:['relieving_letter','offer_promo_letter','appointment_ack'] },
  { keys:['passport_photo','other_certificates'] },
];

async function loadDocuments() {
  if (!currentEmployeeId) { showEmptyPicker(); return; }
  document.getElementById('table-wrap').innerHTML = '<div class="loader"><div class="spinner"></div></div>';
  const qs  = currentEmployeeId ? `?employee_id=${currentEmployeeId}` : '';
  const res = await api('GET', '/documents' + qs);
  if (!res?.success) {
    document.getElementById('table-wrap').innerHTML =
      `<div class="empty-state"><div class="empty-icon">⚠️</div><p>${res?.message || 'Failed to load'}</p></div>`;
    return;
  }
  checklistData = res.data;
  pendingFiles  = {};
  renderTable();
}

function renderTable() {
  const byKey = {};
  for (const d of checklistData) byKey[d.key] = d;

  // Render in the preferred order (groups define order), but NO header rows
  const orderedKeys = DOC_GROUPS.flatMap(g => g.keys);
  const seen = new Set();
  let rows = '';
  for (const k of orderedKeys) {
    if (byKey[k]) { rows += buildRow(byKey[k]); seen.add(k); }
  }
  // Any keys not in the order list (fallback)
  for (const d of checklistData) {
    if (!seen.has(d.key)) rows += buildRow(d);
  }

  document.getElementById('table-wrap').innerHTML =
    `<div class="doc-table-wrap" style="overflow-x:auto"><table class="doc-table">
      <colgroup>
        <col class="col-doc"><col class="col-sub"><col class="col-add"><col class="col-att"><col class="col-date">
      </colgroup>
      <thead><tr>
        <th>Document</th><th>Submitted</th><th>Add Attachments</th><th>Attachments</th><th>Updated (Date &amp; Time)</th>
      </tr></thead>
      <tbody>${rows}</tbody>
    </table></div>`;
}

function buildRow(d) {
  const docs      = d.documents || [];
  const pend      = pendingFiles[d.key] || [];
  const hasFiles  = docs.length > 0;
  const hasPending= pend.length > 0;

  const submitted = (hasFiles || hasPending)
    ? `<span class="doc-status-ok">✅ Yes</span>`
    : `<span class="doc-status-empty">— No</span>`;

  const pendBadge = hasPending
    ? `<div class="pending-badge">📎 ${pend.length} file(s) ready</div>` : '';

  const fileCell = `<div class="doc-file-cell">
    <input type="file" multiple accept=".pdf,.jpg,.jpeg,.png,.doc,.docx" style="font-size:11px;max-width:175px"
      onchange="onFilesChosen('${d.key}',this)">
    ${pendBadge}
  </div>`;

  let attachHtml = `<span class="doc-status-empty">—</span>`;
  if (hasFiles) {
    attachHtml = `<div class="attach-list">` + docs.map(doc => `
      <div class="attach-chip" onclick="viewAttachment(${doc.id},'${escAttr(doc.original_name)}','${escAttr(doc.mime_type)}')">
        <span class="attach-chip-name" title="${escAttr(doc.original_name)}">📎 ${escAttr(doc.original_name)}</span>
        <span class="attach-chip-del" onclick="event.stopPropagation();removeFile(${doc.id})">×</span>
      </div>`).join('') + `</div>`;
  }

  let dtHtml = `<span class="doc-status-empty">—</span>`;
  if (hasFiles && docs[0].uploaded_at) {
    const dt = new Date(docs[0].uploaded_at);
    if (!isNaN(dt)) {
      dtHtml = `<div class="datetime-cell">
        <span class="datetime-date">${fmt.date(docs[0].uploaded_at)}</span>
        <span class="datetime-time">${dt.toLocaleTimeString(window.CFG.currencyLocale,{hour:'2-digit',minute:'2-digit'})}</span>
      </div>`;
    }
  }

  return `<tr>
    <td style="font-weight:600;color:#283593">${d.label}</td>
    <td>${submitted}</td>
    <td>${fileCell}</td>
    <td>${attachHtml}</td>
    <td>${dtHtml}</td>
  </tr>`;
}

function onFilesChosen(docKey, input) {
  const files = Array.from(input.files);
  if (!files.length) return;
  const big = files.filter(f => f.size > 5*1024*1024);
  if (big.length) { toast(`${big.map(f=>f.name).join(', ')} exceed 5MB`, 'error'); input.value=''; return; }
  pendingFiles[docKey] = [...(pendingFiles[docKey]||[]), ...files];
  renderTable();
}

async function viewAttachment(docId, name, mime) {
  document.getElementById('viewerTitle').textContent = '📎 ' + (name||'Attachment');
  document.getElementById('viewerBody').innerHTML = '<div style="text-align:center;padding:30px;color:#888">Loading…</div>';
  document.getElementById('viewerModal').classList.add('open');
  try {
    const res = await fetch(`${API_BASE}/documents/file/${docId}`,
      { headers:{ Authorization:'Bearer '+Auth.getToken() } });
    if (!res.ok) throw new Error('HTTP '+res.status);
    const blob    = await res.blob();
    const blobUrl = URL.createObjectURL(blob);
    const m       = blob.type || mime || '';
    if (m.startsWith('image/')) {
      document.getElementById('viewerBody').innerHTML =
        `<img src="${blobUrl}" style="max-width:100%;max-height:72vh;border-radius:8px;display:block;margin:0 auto" alt="${name}"/>
         <a href="${blobUrl}" download="${name}" class="btn btn-outline btn-sm" style="margin-top:10px;display:inline-block">⬇ Download</a>`;
    } else if (m==='application/pdf') {
      document.getElementById('viewerBody').innerHTML =
        `<iframe src="${blobUrl}" style="width:100%;height:72vh;border:none;border-radius:8px"></iframe>
         <a href="${blobUrl}" download="${name}" class="btn btn-outline btn-sm" style="margin-top:8px;display:inline-block">⬇ Download</a>`;
    } else {
      document.getElementById('viewerBody').innerHTML =
        `<p style="color:#555;margin-bottom:12px">Cannot preview <b>${name}</b>.</p>
         <a href="${blobUrl}" download="${name}" class="btn btn-primary btn-sm">⬇ Download</a>`;
    }
  } catch(err) {
    document.getElementById('viewerBody').innerHTML =
      `<p style="color:#c62828">Failed to load.<br><small>${err.message}</small></p>`;
  }
}

function closeModal(id) { document.getElementById(id).classList.remove('open'); }
document.querySelectorAll('.modal-overlay').forEach(m =>
  m.addEventListener('click', e => { if (e.target===m) m.classList.remove('open'); })
);

async function removeFile(docId) {
  if (!confirm('Remove this attachment?')) return;
  const res = await api('DELETE', '/documents/'+docId);
  if (res?.success) { toast('Removed'); loadDocuments(); }
  else toast(res?.message||'Failed', 'error');
}

async function saveAll() {
  const keys = Object.keys(pendingFiles).filter(k => pendingFiles[k]?.length);
  if (!keys.length) { toast('No files selected', 'warning'); return; }
  const btn = document.getElementById('save-btn');
  btn.disabled=true; btn.textContent='⏳ Saving...';
  let ok=0, fail=0;
  for (const docKey of keys) {
    const files = pendingFiles[docKey];
    const fd    = new FormData();
    files.forEach(f => fd.append('files', f));
    fd.append('employee_id', currentEmployeeId);
    fd.append('doc_key', docKey);
    try {
      const r = await fetch(API_BASE+'/emp-documents/upload-multi',
        { method:'POST', headers:{ Authorization:'Bearer '+Auth.getToken() }, body:fd });
      const d = await r.json();
      if (d.success) ok+=files.length; else fail+=files.length;
    } catch{ fail+=files.length; }
  }
  btn.disabled=false; btn.textContent='💾 Save';
  if (ok)   toast(`${ok} file(s) saved ✅`);
  if (fail) toast(`${fail} file(s) failed`, 'error');
  pendingFiles={};
  loadDocuments();
}

// TAB 2 – PREVIOUS EMPLOYMENT
// ══════════════════════════════════════════════════════════════════════════════
async function loadEmploymentRecords() {
  const el    = document.getElementById('emp-records');
  const empId = currentEmployeeId;
  if (!empId) { el.innerHTML = ''; return; }
  const res   = await api('GET', `/prev-employment/${empId}`);
  if (!res?.success || !res.data?.length) {
    el.innerHTML = ''; return;
  }
  el.innerHTML = `<div style="font-size:12px;font-weight:700;color:var(--muted);letter-spacing:.04em;margin-bottom:10px;margin-top:4px">SAVED RECORDS</div>
    <div class="rec-cards">${res.data.map(r => buildEmpCard(r)).join('')}</div>`;
}

function buildEmpCard(r) {
  const from = r.from_date ? fmt.date(r.from_date) : '—';
  const to   = r.to_date   ? fmt.date(r.to_date)   : 'Present';
  const tags = [
    r.job_type      && `<span class="rec-tag">${r.job_type}</span>`,
    r.city          && `<span class="rec-tag">📍 ${r.city}${r.state?', '+r.state:''}</span>`,
    r.is_overseas   && `<span class="rec-tag" style="background:#e0f2fe;color:#0277bd">🌐 Overseas</span>`,
    r.is_relevant   && `<span class="rec-tag" style="background:#f3e5f5;color:#6a1b9a">✅ Relevant</span>`,
    r.pf_number     && `<span class="rec-tag" style="background:#e8f5e9;color:#2e7d32">🏦 PF: ${r.pf_number}</span>`,
  ].filter(Boolean).join('');
  const hrBtns = isHR ? `
    <button class="btn btn-outline btn-sm" onclick="loadEmpIntoForm(${r.id})" title="Edit">✏️</button>
    <button class="btn btn-sm" style="background:#fce4ec;color:#c62828;border:1px solid #f48fb1" onclick="deleteEmployment(${r.id})" title="Delete">🗑️</button>
  ` : '';
  return `<div class="rec-card" id="emp-card-${r.id}">
    <div class="rec-card-body">
      <div class="rec-card-title">🏢 ${r.company_name}${r.designation ? ' — '+r.designation : ''}</div>
      <div class="rec-card-sub">📅 ${from} → ${to}</div>
      ${tags ? `<div class="rec-card-tags">${tags}</div>` : ''}
      ${r.reason_for_leaving ? `<div style="font-size:11.5px;color:#78909c;margin-top:6px">Reason: ${r.reason_for_leaving}</div>` : ''}
    </div>
    <div class="rec-card-actions">${hrBtns}</div>
  </div>`;
}

function resetEmpForm() {
  document.getElementById('ef-id').value = '';
  ['ef-company','ef-designation','ef-from','ef-to','ef-pf',
   'ef-city','ef-state','ef-mgr-name','ef-mgr-phone','ef-mgr-email',
   'ef-hr-name','ef-hr-phone','ef-hr-email','ef-address','ef-reason'
  ].forEach(id => { const el=document.getElementById(id); if(el) el.value=''; });
  document.getElementById('ef-jobtype').value    = 'Full Time';
  document.getElementById('ef-overseas').checked = false;
  document.getElementById('ef-relevant').checked = false;
  document.getElementById('emp-form-title').textContent = '➕ Add Employment';
}

async function loadEmpIntoForm(id) {
  const empId = currentEmployeeId;
  const res   = await api('GET', `/prev-employment/${empId}`);
  const rec   = res?.data?.find(r => r.id === id);
  if (!rec) return;
  document.getElementById('emp-form-title').textContent    = '✏️ Edit Employment';
  document.getElementById('ef-id').value                   = rec.id;
  document.getElementById('ef-company').value              = rec.company_name        || '';
  document.getElementById('ef-designation').value          = rec.designation         || '';
  document.getElementById('ef-from').value                 = rec.from_date ? rec.from_date.slice(0,10) : '';
  document.getElementById('ef-to').value                   = rec.to_date   ? rec.to_date.slice(0,10)   : '';
  document.getElementById('ef-jobtype').value              = rec.job_type            || 'Full Time';
  document.getElementById('ef-pf').value                   = rec.pf_number           || '';
  document.getElementById('ef-city').value                 = rec.city                || '';
  document.getElementById('ef-state').value                = rec.state               || '';
  document.getElementById('ef-mgr-name').value             = rec.prev_manager_name   || '';
  document.getElementById('ef-mgr-phone').value            = rec.prev_manager_phone  || '';
  document.getElementById('ef-mgr-email').value            = rec.prev_manager_email  || '';
  document.getElementById('ef-hr-name').value              = rec.prev_hr_name        || '';
  document.getElementById('ef-hr-phone').value             = rec.prev_hr_phone       || '';
  document.getElementById('ef-hr-email').value             = rec.prev_hr_email       || '';
  document.getElementById('ef-address').value              = rec.company_address     || '';
  document.getElementById('ef-reason').value               = rec.reason_for_leaving  || '';
  document.getElementById('ef-overseas').checked           = !!rec.is_overseas;
  document.getElementById('ef-relevant').checked           = !!rec.is_relevant;
  document.getElementById('emp-form-box').scrollIntoView({ behavior:'smooth', block:'start' });
}

async function saveEmployment() {
  const company = document.getElementById('ef-company').value.trim();
  if (!company) { toast('Company name is required', 'error'); return; }
  const empId = currentEmployeeId;
  const payload = {
    id:                 document.getElementById('ef-id').value || undefined,
    employee_id:        empId,
    company_name:       company,
    designation:        document.getElementById('ef-designation').value.trim(),
    from_date:          document.getElementById('ef-from').value   || null,
    to_date:            document.getElementById('ef-to').value     || null,
    job_type:           document.getElementById('ef-jobtype').value,
    pf_number:          document.getElementById('ef-pf').value.trim(),
    city:               document.getElementById('ef-city').value.trim(),
    state:              document.getElementById('ef-state').value.trim(),
    prev_manager_name:  document.getElementById('ef-mgr-name').value.trim(),
    prev_manager_phone: document.getElementById('ef-mgr-phone').value.trim(),
    prev_manager_email: document.getElementById('ef-mgr-email').value.trim(),
    prev_hr_name:       document.getElementById('ef-hr-name').value.trim(),
    prev_hr_phone:      document.getElementById('ef-hr-phone').value.trim(),
    prev_hr_email:      document.getElementById('ef-hr-email').value.trim(),
    company_address:    document.getElementById('ef-address').value.trim(),
    reason_for_leaving: document.getElementById('ef-reason').value.trim(),
    is_overseas:        document.getElementById('ef-overseas').checked,
    is_relevant:        document.getElementById('ef-relevant').checked,
  };
  const res = await api('POST', '/prev-employment', payload);
  if (res?.success) { toast('Employment saved ✅'); resetEmpForm(); loadEmploymentRecords(); }
  else toast(res?.message || 'Failed to save', 'error');
}

async function deleteEmployment(id) {
  if (!confirm('Delete this record?')) return;
  const res = await api('DELETE', `/prev-employment/${id}`);
  if (res?.success) { toast('Deleted'); loadEmploymentRecords(); }
  else toast(res?.message || 'Failed', 'error');
}

// TAB 3 – QUALIFICATIONS

async function loadQualificationRecords() {
  const el    = document.getElementById('qual-records');
  const empId = currentEmployeeId;
  if (!empId) { el.innerHTML = ''; return; }
  const res   = await api('GET', `/qualifications/${empId}`);
  if (!res?.success || !res.data?.length) {
    el.innerHTML = ''; return;
  }
  el.innerHTML = `<div style="font-size:12px;font-weight:700;color:var(--muted);letter-spacing:.04em;margin-bottom:10px;margin-top:4px">SAVED RECORDS</div>
    <div class="rec-cards">${res.data.map(r => buildQualCard(r)).join('')}</div>`;
}

const MONTHS = ['','January','February','March','April','May','June','July','August','September','October','November','December'];

function buildQualCard(r) {
  const passed = [r.passing_month ? MONTHS[r.passing_month] : '', r.passing_year].filter(Boolean).join(' ');
  const tags = [
    r.qualification   && `<span class="rec-tag">${r.qualification}</span>`,
    r.mode_of_education && `<span class="rec-tag">${r.mode_of_education}</span>`,
    r.grade_percentage  && `<span class="rec-tag">📊 ${r.grade_percentage}</span>`,
    passed              && `<span class="rec-tag">📅 ${passed}</span>`,
    r.is_highest        && `<span class="rec-tag" style="background:#fff8e1;color:#e65100">⭐ Highest</span>`,
  ].filter(Boolean).join('');
  const hrBtns = isHR ? `
    <button class="btn btn-outline btn-sm" onclick="loadQualIntoForm(${r.id})" title="Edit">✏️</button>
    <button class="btn btn-sm" style="background:#fce4ec;color:#c62828;border:1px solid #f48fb1" onclick="deleteQualification(${r.id})" title="Delete">🗑️</button>
  ` : '';
  return `<div class="rec-card" id="qual-card-${r.id}">
    <div class="rec-card-body">
      <div class="rec-card-title">🎓 ${r.degree || r.qualification}${r.specialization ? ' — '+r.specialization : ''}</div>
      <div class="rec-card-sub">🏫 ${r.institute_name}${r.board_university ? ' · '+r.board_university : ''}</div>
      ${tags ? `<div class="rec-card-tags">${tags}</div>` : ''}
      ${r.academic_achievements ? `<div style="font-size:11.5px;color:#78909c;margin-top:6px">🏆 ${r.academic_achievements}</div>` : ''}
    </div>
    <div class="rec-card-actions">${hrBtns}</div>
  </div>`;
}

function resetQualForm() {
  document.getElementById('qf-id').value = '';
  ['qf-degree','qf-spec','qf-institute','qf-board','qf-state','qf-grade','qf-achievements','qf-remarks'
  ].forEach(id => { const el=document.getElementById(id); if(el) el.value=''; });
  document.getElementById('qf-qual').value  = '';
  document.getElementById('qf-mode').value  = '';
  document.getElementById('qf-month').value = '';
  document.getElementById('qf-year').value  = '';
  document.getElementById('qf-highest').checked = false;
  document.getElementById('qual-form-title').textContent = '➕ Add Qualification';
}

async function loadQualIntoForm(id) {
  const empId = currentEmployeeId;
  const res   = await api('GET', `/qualifications/${empId}`);
  const rec   = res?.data?.find(r => r.id === id);
  if (!rec) return;
  document.getElementById('qual-form-title').textContent      = '✏️ Edit Qualification';
  document.getElementById('qf-id').value                      = rec.id;
  document.getElementById('qf-qual').value                    = rec.qualification       || '';
  document.getElementById('qf-degree').value                  = rec.degree              || '';
  document.getElementById('qf-spec').value                    = rec.specialization      || '';
  document.getElementById('qf-institute').value               = rec.institute_name      || '';
  document.getElementById('qf-board').value                   = rec.board_university    || '';
  document.getElementById('qf-mode').value                    = rec.mode_of_education   || '';
  document.getElementById('qf-state').value                   = rec.state_location      || '';
  document.getElementById('qf-grade').value                   = rec.grade_percentage    || '';
  document.getElementById('qf-month').value                   = rec.passing_month       || '';
  document.getElementById('qf-year').value                    = rec.passing_year        || '';
  document.getElementById('qf-achievements').value            = rec.academic_achievements || '';
  document.getElementById('qf-remarks').value                 = rec.remarks             || '';
  document.getElementById('qf-highest').checked               = !!rec.is_highest;
  document.getElementById('qual-form-box').scrollIntoView({ behavior:'smooth', block:'start' });
}

async function saveQualification() {
  const qual      = document.getElementById('qf-qual').value;
  const institute = document.getElementById('qf-institute').value.trim();
  if (!qual)      { toast('Qualification is required', 'error'); return; }
  if (!institute) { toast('Institute name is required', 'error'); return; }
  const empId = currentEmployeeId;
  const payload = {
    id:                    document.getElementById('qf-id').value || undefined,
    employee_id:           empId,
    qualification:         qual,
    degree:                document.getElementById('qf-degree').value.trim(),
    specialization:        document.getElementById('qf-spec').value.trim(),
    institute_name:        institute,
    board_university:      document.getElementById('qf-board').value.trim(),
    mode_of_education:     document.getElementById('qf-mode').value,
    state_location:        document.getElementById('qf-state').value.trim(),
    grade_percentage:      document.getElementById('qf-grade').value.trim(),
    passing_month:         document.getElementById('qf-month').value || null,
    passing_year:          document.getElementById('qf-year').value  || null,
    academic_achievements: document.getElementById('qf-achievements').value.trim(),
    remarks:               document.getElementById('qf-remarks').value.trim(),
    is_highest:            document.getElementById('qf-highest').checked,
  };
  const res = await api('POST', '/qualifications', payload);
  if (res?.success) { toast('Qualification saved ✅'); resetQualForm(); loadQualificationRecords(); }
  else toast(res?.message || 'Failed to save', 'error');
}

async function deleteQualification(id) {
  if (!confirm('Delete this record?')) return;
  const res = await api('DELETE', `/qualifications/${id}`);
  if (res?.success) { toast('Deleted'); loadQualificationRecords(); }
  else toast(res?.message || 'Failed', 'error');
}

// ── ZIP Download ──────────────────────────────────────────────────────────────
async function downloadZip() {
  if (!currentEmployeeId) { toast('No employee selected', 'error'); return; }
  const btn = document.querySelector('[onclick="downloadZip()"]');
  if (btn) { btn.disabled = true; btn.textContent = '⏳ Preparing…'; }
  try {
    const res = await fetch(`${API_BASE}/documents/download-zip/${currentEmployeeId}`,
      { headers: { Authorization: 'Bearer ' + Auth.getToken() } });
    if (!res.ok) throw new Error('HTTP ' + res.status);
    const blob = await res.blob();
    const url  = URL.createObjectURL(blob);
    const a    = document.createElement('a');
    a.href = url;
    a.download = `employee_${currentEmployeeId}_documents.zip`;
    a.click();
    URL.revokeObjectURL(url);
    toast('ZIP downloaded ✅');
  } catch(err) {
    toast('Download failed: ' + err.message, 'error');
  }
  if (btn) { btn.disabled = false; btn.textContent = '⬇️ Download ZIP'; }
}

// ── Helpers ───────────────────────────────────────────────────────────────────
function escAttr(s) {
  return String(s||'').replace(/&/g,'&amp;').replace(/'/g,"\\'").replace(/"/g,'&quot;');
}
