<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"><meta name="viewport" content="width=device-width,initial-scale=1">
<title id="page-title">Documents</title>
<script src="config.js"></script>
<link href="https://fonts.googleapis.com/css2?family=DM+Sans:ital,opsz,wght@0,9..40,300;0,9..40,400;0,9..40,500;0,9..40,600;0,9..40,700;0,9..40,800;1,9..40,400&display=swap" rel="stylesheet">
<link rel="stylesheet" href="style.css">
<style>
.doc-table-wrap { border-radius:10px;overflow:hidden;border:1px solid #9fa8da }
.doc-table { width:100%;border-collapse:collapse;min-width:960px;table-layout:fixed }
.doc-table col.col-doc   { width:26%   }
.doc-table col.col-sub   { width:11%   }
.doc-table col.col-add   { width:20%   }
.doc-table col.col-att   { width:24%   }
.doc-table col.col-date  { width:19%   }
.doc-table th {
  background:#3949ab;
  color:#fff;font-size:11.5px;font-weight:700;letter-spacing:.03em;
  padding:11px 14px;text-align:center;white-space:nowrap;border:1px solid #5c6bc0;
}
.doc-table th:first-child { text-align:left }
.doc-table td { border:1px solid #e0e3ec;padding:11px 14px;font-size:12.5px;vertical-align:middle;text-align:center;background:#fff }
.doc-table tr:nth-child(even) td { background:#f5f6fb }
.doc-table tr:hover td { background:#e8eaf6 }
.doc-table td:first-child { word-break:break-word }
.doc-status-ok    { display:inline-flex;align-items:center;gap:5px;color:#1b5e20;font-weight:700;font-size:11.5px;background:#e8f5e9;border:1px solid #a5d6a7;padding:3px 10px;border-radius:6px }
.doc-status-empty { display:inline-flex;align-items:center;gap:4px;color:#78909c;font-weight:600;font-size:11.5px;background:#eceff1;border:1px solid #cfd8dc;padding:3px 10px;border-radius:6px }
.emp-picker-bar { display:flex;align-items:center;gap:12px;margin-bottom:18px;flex-wrap:wrap }
.emp-picker-bar select { min-width:260px }
.doc-file-cell { display:flex;flex-direction:column;align-items:center;gap:4px }
.pending-badge { font-size:10.5px;color:#283593;background:#e8eaf6;border:1px solid #9fa8da;border-radius:6px;padding:3px 8px;margin-top:3px;max-width:170px;overflow:hidden;text-overflow:ellipsis;white-space:nowrap;font-weight:600 }
.attach-list { display:flex;flex-direction:column;gap:5px;align-items:center }
.attach-chip { display:inline-flex;align-items:center;gap:6px;background:#e8f5e9;border:1px solid #a5d6a7;border-radius:6px;padding:4px 10px 4px 9px;font-size:11px;color:#1b5e20;cursor:pointer;transition:background .15s;max-width:175px;font-weight:600 }
.attach-chip:hover { background:#c8e6c9 }
.attach-chip-name { overflow:hidden;text-overflow:ellipsis;white-space:nowrap;max-width:115px }
.attach-chip-del { margin-left:2px;color:#90a4ae;cursor:pointer;font-size:13px;line-height:1;flex-shrink:0;padding:0 2px }
.attach-chip-del:hover { color:#c62828 }
.datetime-cell { display:flex;flex-direction:column;align-items:center;gap:2px }
.datetime-date { font-size:12px;font-weight:700;color:#283593 }
.datetime-time { font-size:11px;color:#5c6bc0;font-weight:600 }
/* ── Attachment Viewer Modal (matches reimbursement.html) ── */
.modal-overlay{display:none;position:fixed;inset:0;background:rgba(0,0,0,.45);z-index:1000;align-items:center;justify-content:center}
.modal-overlay.open{display:flex}
.modal-box{background:#fff;border-radius:16px;width:min(640px,95vw);max-height:90vh;overflow-y:auto;padding:24px;box-shadow:0 8px 40px rgba(0,0,0,.2)}
.modal-box h3{font-size:17px;font-weight:700;margin-bottom:16px;color:#1b4332}
.modal-close{float:right;background:none;border:none;font-size:22px;cursor:pointer;color:#888;margin-top:-4px}
.viewer-frame{width:100%;height:70vh;border:none;border-radius:8px;background:#f0f0f0}
</style>
</head>
<body>
<div class="sidebar-overlay" id="sidebar-overlay" onclick="closeSidebar()"></div>
<aside class="sidebar">
  <div class="sidebar-logo">
    <div class="logo-mark" id="sidebar-logo-mark">
      <svg class="logo-mark-icon" viewBox="0 0 24 24"><path d="M12 2L2 7l10 5 10-5-10-5zM2 17l10 5 10-5M2 12l10 5 10-5"/></svg>
    </div>
    <div><div class="logo-text-wrap"><div class="logo-text" id="sidebar-logo-text"></div></div></div>
  </div>
  <nav id="sidebar-nav"></nav>
  <div class="sidebar-footer">
    <div id="sidebar-user"></div>
    <button class="logout-btn" onclick="Auth.logout()">
      <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"><path d="M9 21H5a2 2 0 0 1-2-2V5a2 2 0 0 1 2-2h4"/><polyline points="16,17 21,12 16,7"/><line x1="21" y1="12" x2="9" y2="12"/></svg>
      Sign Out
    </button>
  </div>
</aside>

<div class="main">
  <div class="topbar">
    <div class="topbar-left">
      <button class="hamburger-btn" onclick="toggleSidebar()"><span></span><span></span><span></span></button>
      <div class="topbar-title">📄 Documents</div>
    </div>
    <div class="topbar-right">
      <button class="btn btn-outline btn-sm" onclick="loadDocuments()">🔄 Refresh</button>
      <button id="notif-bell-btn" class="topbar-icon-btn notif-btn" title="Notifications">🔔<span id="notif-badge"></span></button>
      <a class="topbar-icon-btn" href="dashboard.html" title="Dashboard">🏠</a>
    </div>
  </div>

  <div class="content fade-in">
    <div class="card">
      <!-- HR-only employee search -->
      <div class="emp-picker-bar" id="emp-picker-bar" style="display:none">
        <span style="font-size:12px;font-weight:700;color:var(--muted)">VIEWING DOCUMENTS FOR:</span>
        <div style="position:relative;flex:1;max-width:360px">
          <input id="emp-search" class="form-control" placeholder="Search by name or employee code…"
            oninput="onEmpSearch()" autocomplete="off"
            style="padding-right:36px">
          <div id="emp-search-results" style="display:none;position:absolute;top:100%;left:0;right:0;background:#fff;border:1.5px solid var(--border);border-radius:8px;box-shadow:0 4px 16px rgba(0,0,0,.12);z-index:100;max-height:240px;overflow-y:auto"></div>
        </div>
        <div id="emp-selected-badge" style="display:none;background:var(--accent-l);border:1.5px solid var(--accent);border-radius:8px;padding:5px 12px;font-size:13px;font-weight:600;color:var(--accent)"></div>
      </div>

      <!-- Tabs -->
      <div style="display:flex;gap:4px;border-bottom:2px solid var(--border);margin-bottom:20px;flex-wrap:wrap">
        <button class="tab-btn active" id="dtab-docs-btn" onclick="switchDocTab('docs',this)" style="padding:10px 18px;font-size:13px;font-weight:600;cursor:pointer;border:none;background:none;color:var(--accent);border-bottom:3px solid var(--accent);margin-bottom:-2px">📄 Documents</button>
        <button class="tab-btn" id="dtab-emp-btn" onclick="switchDocTab('emp',this)" style="padding:10px 18px;font-size:13px;font-weight:600;cursor:pointer;border:none;background:none;color:var(--muted);border-bottom:3px solid transparent;margin-bottom:-2px">🏢 Previous Employment</button>
        <button class="tab-btn" id="dtab-qual-btn" onclick="switchDocTab('qual',this)" style="padding:10px 18px;font-size:13px;font-weight:600;cursor:pointer;border:none;background:none;color:var(--muted);border-bottom:3px solid transparent;margin-bottom:-2px">🎓 Qualifications</button>
      </div>

      <!-- Documents Tab -->
      <div id="dtab-docs">
        <div id="table-wrap"><div class="loader"><div class="spinner"></div></div></div>
        <div style="margin-top:18px;display:flex;justify-content:flex-end;gap:10px">
          <button class="btn btn-primary" id="save-btn" onclick="saveAll()">💾 Save</button>
        </div>
      </div>

      <!-- Previous Employment Tab -->
      <div id="dtab-emp" style="display:none">
        <div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:16px">
          <div style="font-size:14px;font-weight:700;color:var(--text)">🏢 Previous Employment History</div>
          <button class="btn btn-primary btn-sm" onclick="openPrevEmpModal()">+ Add Employment</button>
        </div>
        <div id="prev-emp-list"><div class="loader"><div class="spinner"></div></div></div>
      </div>

      <!-- Qualifications Tab -->
      <div id="dtab-qual" style="display:none">
        <div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:16px">
          <div style="font-size:14px;font-weight:700;color:var(--text)">🎓 Educational Qualifications</div>
          <button class="btn btn-primary btn-sm" onclick="openQualModal()">+ Add Qualification</button>
        </div>
        <div id="qual-list"><div class="loader"><div class="spinner"></div></div></div>
      </div>
    </div>
  </div>
</div>

<!-- ── Attachment Viewer Modal ── -->
<div class="modal-overlay" id="viewerModal">
  <div class="modal-box">
    <button class="modal-close" onclick="closeModal('viewerModal')">×</button>
    <h3 id="viewerTitle">Attachment</h3>
    <div id="viewerBody"></div>
  </div>
</div>

<script src="app.js"></script>
<script>
Auth.guard();

const HR_ROLES = ['hr', 'admin', 'super_admin'];
let isHR = false;
let currentEmployeeId = null;
let checklistData = [];
// pendingFiles[doc_key] = array of File objects selected but not yet uploaded
let pendingFiles = {};

document.addEventListener('DOMContentLoaded', async () => {
  buildSidebar('documents.html');
  const user = Auth.getUser();
  isHR = HR_ROLES.includes(user.role);
  currentEmployeeId = user.id;

  if (isHR) {
    document.getElementById('emp-picker-bar').style.display = 'flex';
    await loadEmployeePicker();
  }
  await loadDocuments();
});

let _allEmployees = [];

async function loadEmployeePicker() {
  const res = await api('GET', '/documents/employees');
  if (!res?.success) return;
  _allEmployees = res.data || [];
  // Show own name as selected by default
  const user = Auth.getUser();
  const me = _allEmployees.find(e => e.id === user.id);
  if (me) {
    document.getElementById('emp-selected-badge').textContent = `${me.employee_code} — ${me.first_name} ${me.last_name} (Me)`;
    document.getElementById('emp-selected-badge').style.display = '';
  }
}

function onEmpSearch() {
  const q = document.getElementById('emp-search').value.trim().toLowerCase();
  const results = document.getElementById('emp-search-results');
  if (!q) { results.style.display = 'none'; return; }
  const matches = _allEmployees.filter(e =>
    (e.first_name+' '+e.last_name).toLowerCase().includes(q) ||
    e.employee_code.toLowerCase().includes(q)
  ).slice(0, 10);
  if (!matches.length) { results.style.display = 'none'; return; }
  results.innerHTML = matches.map(e => `
    <div onclick="selectEmployee(${e.id},'${e.employee_code}','${e.first_name} ${e.last_name}')"
      style="padding:10px 14px;cursor:pointer;font-size:13px;border-bottom:1px solid var(--border)"
      onmouseover="this.style.background='var(--accent-l)'" onmouseout="this.style.background=''">
      <span style="font-weight:700;color:var(--accent)">${e.employee_code}</span> — ${e.first_name} ${e.last_name}
      ${e.department_name ? `<span style="color:var(--muted);font-size:11px"> · ${e.department_name}</span>` : ''}
    </div>`).join('');
  results.style.display = '';
}

function selectEmployee(id, code, name) {
  currentEmployeeId = id;
  pendingFiles = {};
  document.getElementById('emp-search').value = '';
  document.getElementById('emp-search-results').style.display = 'none';
  document.getElementById('emp-selected-badge').textContent = `${code} — ${name}`;
  document.getElementById('emp-selected-badge').style.display = '';
  loadDocuments();
  // Reload active tab
  const active = ['emp','qual'].find(t => document.getElementById('dtab-'+t).style.display !== 'none');
  if (active === 'emp') loadPrevEmp();
  if (active === 'qual') loadQualifications();
}

// Close search results on outside click
document.addEventListener('click', e => {
  if (!e.target.closest('#emp-picker-bar')) {
    const r = document.getElementById('emp-search-results');
    if (r) r.style.display = 'none';
  }
});

async function loadDocuments() {
  document.getElementById('table-wrap').innerHTML = '<div class="loader"><div class="spinner"></div></div>';
  const qs = currentEmployeeId ? `?employee_id=${currentEmployeeId}` : '';
  const res = await api('GET', '/documents' + qs);
  if (!res?.success) {
    document.getElementById('table-wrap').innerHTML = `<div class="empty-state"><div class="empty-icon">⚠️</div><p>${res?.message || 'Failed to load documents'}</p></div>`;
    return;
  }
  checklistData = res.data;
  pendingFiles = {};
  renderTable();
}

function renderTable() {
  const wrap = document.getElementById('table-wrap');
  wrap.innerHTML = `<div class="doc-table-wrap" style="overflow-x:auto"><table class="doc-table">
    <colgroup>
      <col class="col-doc"><col class="col-sub"><col class="col-add"><col class="col-att"><col class="col-date">
    </colgroup>
    <thead><tr>
      <th style="text-align:left">Document</th>
      <th>Submitted</th>
      <th>Add Attachments</th>
      <th>Attachments</th>
      <th>Updated (Date &amp; Time)</th>
    </tr></thead>
    <tbody>${checklistData.map(d => buildRow(d)).join('')}</tbody>
  </table></div>`;
}

function buildRow(d) {
  const docs = d.documents || [];
  const pend = pendingFiles[d.key] || [];
  const hasFiles = docs.length > 0;
  const hasPending = pend.length > 0;

  const submittedHtml = (hasFiles || hasPending)
    ? `<span class="doc-status-ok">✅ Yes</span>`
    : `<span class="doc-status-empty">— No</span>`;

  const pendBadge = hasPending
    ? `<div class="pending-badge">📎 ${pend.length} file(s) ready to upload</div>` : '';
  const fileInputHtml = `
    <div class="doc-file-cell">
      <input type="file" multiple accept=".pdf,.jpg,.jpeg,.png,.doc,.docx" style="font-size:11px;max-width:175px"
        onchange="onFilesChosen('${d.key}', this)">
      ${pendBadge}
    </div>`;

  let attachmentHtml = `<span class="doc-status-empty">—</span>`;
  if (hasFiles) {
    attachmentHtml = `<div class="attach-list">` + docs.map(doc => `
        <div class="attach-chip" onclick="viewAttachment(${doc.id}, '${escAttr(doc.original_name)}', '${escAttr(doc.mime_type)}')">
          <span class="attach-chip-name" title="${escAttr(doc.original_name)}">📎 ${escAttr(doc.original_name)}</span>
          <span class="attach-chip-del" title="Remove" onclick="event.stopPropagation();removeFile(${doc.id})">×</span>
        </div>`).join('') + `</div>`;
  }

  // Date & time of the most recent upload (documents are pre-sorted newest-first by the API)
  let dtHtml = `<span class="doc-status-empty">—</span>`;
  if (hasFiles) {
    const dt = docs[0].uploaded_at ? new Date(docs[0].uploaded_at) : null;
    if (dt && !isNaN(dt)) {
      const datePart = fmt.date(docs[0].uploaded_at);
      const timePart = dt.toLocaleTimeString(window.CFG.currencyLocale, { hour: '2-digit', minute: '2-digit' });
      dtHtml = `<div class="datetime-cell"><span class="datetime-date">${datePart}</span><span class="datetime-time">${timePart}</span></div>`;
    }
  }

  return `<tr>
    <td style="text-align:left;font-weight:600;color:#283593">${d.label}</td>
    <td>${submittedHtml}</td>
    <td>${fileInputHtml}</td>
    <td>${attachmentHtml}</td>
    <td>${dtHtml}</td>
  </tr>`;
}

function escAttr(s) {
  return String(s || '').replace(/&/g, '&amp;').replace(/'/g, "\\'").replace(/"/g, '&quot;');
}

function onFilesChosen(docKey, input) {
  const newFiles = Array.from(input.files);
  if (!newFiles.length) return;

  const oversized = newFiles.filter(f => f.size > 5 * 1024 * 1024);
  if (oversized.length) {
    toast(`${oversized.map(f => f.name).join(', ')} exceed 5MB limit`, 'error');
    input.value = '';
    return;
  }

  pendingFiles[docKey] = [...(pendingFiles[docKey] || []), ...newFiles];
  renderTable();
}

// ── Attachment Viewer ──────────────────────────────────────────────────────────
async function viewAttachment(docId, name, mime) {
  document.getElementById('viewerTitle').textContent = '📎 ' + (name || 'Attachment');
  document.getElementById('viewerBody').innerHTML = '<div style="text-align:center;padding:30px;color:#888">Loading…</div>';
  document.getElementById('viewerModal').classList.add('open');

  const url   = `${API_BASE}/documents/file/${docId}`;
  const token = Auth.getToken();

  try {
    const res = await fetch(url, { headers: { Authorization: 'Bearer ' + token } });
    if (!res.ok) throw new Error('HTTP ' + res.status);
    const blob = await res.blob();
    const blobUrl = URL.createObjectURL(blob);
    const actualMime = blob.type || mime || '';

    if (actualMime.startsWith('image/')) {
      document.getElementById('viewerBody').innerHTML =
        `<img src="${blobUrl}" style="max-width:100%;max-height:72vh;border-radius:8px;display:block;margin:0 auto" alt="${name}"/>
         <a href="${blobUrl}" download="${name}" class="btn btn-outline btn-sm" style="margin-top:10px;display:inline-block">⬇ Download</a>`;
    } else if (actualMime === 'application/pdf') {
      document.getElementById('viewerBody').innerHTML =
        `<iframe class="viewer-frame" src="${blobUrl}" style="width:100%;height:72vh;border:none;border-radius:8px"></iframe>
         <a href="${blobUrl}" download="${name}" class="btn btn-outline btn-sm" style="margin-top:8px;display:inline-block">⬇ Download</a>`;
    } else {
      document.getElementById('viewerBody').innerHTML =
        `<p style="color:#555;margin-bottom:12px">Cannot preview <b>${name}</b> in browser.</p>
         <a href="${blobUrl}" download="${name}" class="btn btn-primary btn-sm">⬇ Download File</a>`;
    }
  } catch (err) {
    document.getElementById('viewerBody').innerHTML =
      `<p style="color:#c62828">Failed to load attachment. Please try again.<br><small>${err.message}</small></p>`;
  }
}

function closeModal(id) {
  document.getElementById(id).classList.remove('open');
}
document.querySelectorAll('.modal-overlay').forEach(m => {
  m.addEventListener('click', e => { if (e.target === m) m.classList.remove('open'); });
});

async function removeFile(docId) {
  if (!confirm('Remove this attachment?')) return;
  const res = await api('DELETE', '/documents/' + docId);
  if (res?.success) { toast('Attachment removed'); loadDocuments(); }
  else toast(res?.message || 'Failed to remove', 'error');
}

async function saveAll() {
  const keys = Object.keys(pendingFiles).filter(k => pendingFiles[k]?.length);
  if (!keys.length) { toast('No new files selected', 'warning'); return; }

  const btn = document.getElementById('save-btn');
  btn.disabled = true; btn.textContent = '⏳ Saving...';

  let okCount = 0, failCount = 0;
  const token = Auth.getToken();

  for (const docKey of keys) {
    const files = pendingFiles[docKey];
    const formData = new FormData();
    files.forEach(f => formData.append('files', f));
    formData.append('employee_id', currentEmployeeId);
    formData.append('doc_key', docKey);

    try {
      const res = await fetch(API_BASE + '/emp-documents/upload-multi', {
        method: 'POST',
        headers: { Authorization: 'Bearer ' + token },
        body: formData
      });
      const data = await res.json();
      if (data.success) okCount += files.length; else failCount += files.length;
    } catch (e) {
      failCount += files.length;
    }
  }

  btn.disabled = false; btn.textContent = '💾 Save';

  if (okCount) toast(`${okCount} file(s) saved successfully`);
  if (failCount) toast(`${failCount} file(s) failed to upload`, 'error');

  pendingFiles = {};
  loadDocuments();
}
// ── Tab switching ─────────────────────────────────────────────────────────────
function switchDocTab(tab, btn) {
  document.querySelectorAll('.tab-btn').forEach(b => {
    b.style.color = 'var(--muted)'; b.style.borderBottomColor = 'transparent'; b.style.background = 'none';
  });
  btn.style.color = 'var(--accent)'; btn.style.borderBottomColor = 'var(--accent)'; btn.style.background = 'var(--accent-l)';
  ['docs','emp','qual'].forEach(t => document.getElementById('dtab-'+t).style.display = t===tab?'':'none');
  if (tab==='emp')  loadPrevEmp();
  if (tab==='qual') loadQualifications();
}

// ── Previous Employment ───────────────────────────────────────────────────────
let _prevEmpData = [], _qualData = [];
const MONTHS = ['','January','February','March','April','May','June','July','August','September','October','November','December'];

async function loadPrevEmp() {
  const el = document.getElementById('prev-emp-list');
  el.innerHTML = '<div class="loader"><div class="spinner"></div></div>';
  const data = await api('GET', `/prev-employment/${currentEmployeeId}`);
  _prevEmpData = data?.data || [];
  if (!_prevEmpData.length) { el.innerHTML = '<div class="empty-state"><div class="empty-icon">🏢</div><p>No previous employment added yet.</p></div>'; return; }
  const isHR = Role.is('hr','admin','super_admin');
  el.innerHTML = _prevEmpData.map(r => `
    <div style="background:#fff;border:1.5px solid var(--border);border-radius:12px;padding:16px 20px;margin-bottom:12px">
      <div style="display:flex;justify-content:space-between;align-items:flex-start">
        <div>
          <div style="font-size:15px;font-weight:700">${r.company_name}</div>
          <div style="font-size:13px;color:var(--accent);margin-top:2px">${r.designation||''} ${r.job_type?'· '+r.job_type:''}</div>
          <div style="font-size:12px;color:var(--muted);margin-top:4px">📅 ${r.from_date?fmt.date(r.from_date):''} → ${r.to_date?fmt.date(r.to_date):'Present'}</div>
          ${r.city||r.state?`<div style="font-size:12px;color:var(--muted)">${[r.city,r.state].filter(Boolean).join(', ')}</div>`:''}
          ${r.reason_for_leaving?`<div style="font-size:12px;color:var(--muted);margin-top:4px">Reason: ${r.reason_for_leaving}</div>`:''}
          ${r.prev_manager_name?`<div style="font-size:12px;color:var(--muted);margin-top:4px">👤 Manager: ${r.prev_manager_name}${r.prev_manager_phone?' · '+r.prev_manager_phone:''}</div>`:''}
        </div>
        <div style="display:flex;gap:6px;flex-shrink:0;align-items:center">
          ${r.is_relevant?'<span style="background:#dcfce7;color:#166534;padding:2px 8px;border-radius:10px;font-size:11px;font-weight:700">Relevant</span>':''}
          ${r.is_overseas?'<span style="background:#e0e7ff;color:#3730a3;padding:2px 8px;border-radius:10px;font-size:11px;font-weight:700">Overseas</span>':''}
          ${isHR?`<button class="btn btn-outline btn-sm" onclick="editPrevEmp(${r.id})">✏️</button>
                  <button class="btn btn-danger btn-sm" onclick="deletePrevEmp(${r.id})">🗑</button>`:''}
        </div>
      </div>
    </div>`).join('');
}

function openPrevEmpModal(r={}) {
  const isEdit = !!r.id;
  const fields = {
    'pe-id':r.id||'','pe-company':r.company_name||'','pe-address':r.company_address||'',
    'pe-city':r.city||'','pe-state':r.state||'','pe-from':r.from_date?.split('T')[0]||'',
    'pe-to':r.to_date?.split('T')[0]||'','pe-designation':r.designation||'',
    'pe-mgr-name':r.prev_manager_name||'','pe-mgr-phone':r.prev_manager_phone||'',
    'pe-mgr-email':r.prev_manager_email||'','pe-hr-name':r.prev_hr_name||'',
    'pe-hr-phone':r.prev_hr_phone||'','pe-hr-email':r.prev_hr_email||'',
    'pe-pf':r.pf_number||'','pe-reason':r.reason_for_leaving||''
  };
  Object.entries(fields).forEach(([id,val]) => { const el=document.getElementById(id); if(el) el.value=val; });
  document.getElementById('pe-jobtype').value = r.job_type||'Full Time';
  document.getElementById('pe-overseas').checked = !!r.is_overseas;
  document.getElementById('pe-relevant').checked = !!r.is_relevant;
  document.getElementById('pe-modal-title').textContent = isEdit ? '🏢 Edit Employment' : '🏢 Add Previous Employment';
  openModal('prev-emp-modal');
}

function editPrevEmp(id) { openPrevEmpModal(_prevEmpData.find(r=>r.id===id)||{}); }

async function deletePrevEmp(id) {
  if (!confirm('Delete this employment record?')) return;
  const d = await api('DELETE', `/prev-employment/${id}`);
  if (d?.success) { toast('Deleted','success'); loadPrevEmp(); } else toast('Failed','error');
}

async function savePrevEmp() {
  const btn = document.getElementById('pe-save-btn');
  btn.disabled=true; btn.textContent='⏳ Saving…';
  const body = {
    id: document.getElementById('pe-id').value||undefined,
    employee_id: currentEmployeeId,
    company_name: document.getElementById('pe-company').value.trim(),
    company_address: document.getElementById('pe-address').value.trim(),
    city: document.getElementById('pe-city').value.trim(),
    state: document.getElementById('pe-state').value.trim(),
    from_date: document.getElementById('pe-from').value||null,
    to_date: document.getElementById('pe-to').value||null,
    designation: document.getElementById('pe-designation').value.trim(),
    job_type: document.getElementById('pe-jobtype').value,
    prev_manager_name: document.getElementById('pe-mgr-name').value.trim(),
    prev_manager_phone: document.getElementById('pe-mgr-phone').value.trim(),
    prev_manager_email: document.getElementById('pe-mgr-email').value.trim(),
    prev_hr_name: document.getElementById('pe-hr-name').value.trim(),
    prev_hr_phone: document.getElementById('pe-hr-phone').value.trim(),
    prev_hr_email: document.getElementById('pe-hr-email').value.trim(),
    pf_number: document.getElementById('pe-pf').value.trim(),
    reason_for_leaving: document.getElementById('pe-reason').value.trim(),
    is_overseas: document.getElementById('pe-overseas').checked,
    is_relevant: document.getElementById('pe-relevant').checked,
  };
  const d = await api('POST', '/prev-employment', body);
  btn.disabled=false; btn.textContent='💾 Save';
  if (d?.success) { toast('Saved ✅','success'); closeModal('prev-emp-modal'); loadPrevEmp(); }
  else toast(d?.message||'Failed','error');
}

// ── Qualifications ────────────────────────────────────────────────────────────
async function loadQualifications() {
  const el = document.getElementById('qual-list');
  el.innerHTML = '<div class="loader"><div class="spinner"></div></div>';
  const data = await api('GET', `/qualifications/${currentEmployeeId}`);
  _qualData = data?.data || [];
  if (!_qualData.length) { el.innerHTML = '<div class="empty-state"><div class="empty-icon">🎓</div><p>No qualifications added yet.</p></div>'; return; }
  const isHR = Role.is('hr','admin','super_admin');
  el.innerHTML = _qualData.map(r => `
    <div style="background:#fff;border:1.5px solid var(--border);border-radius:12px;padding:16px 20px;margin-bottom:12px">
      <div style="display:flex;justify-content:space-between;align-items:flex-start">
        <div>
          <div style="display:flex;align-items:center;gap:8px">
            <span style="font-size:15px;font-weight:700">${r.qualification}${r.degree?' — '+r.degree:''}</span>
            ${r.is_highest?'<span style="background:#dcfce7;color:#166534;padding:2px 8px;border-radius:10px;font-size:11px;font-weight:700">⭐ Highest</span>':''}
          </div>
          <div style="font-size:13px;color:var(--accent);font-weight:600;margin-top:2px">${r.institute_name}</div>
          ${r.board_university?`<div style="font-size:12px;color:var(--muted)">${r.board_university}</div>`:''}
          <div style="font-size:12px;color:var(--muted);margin-top:4px">
            ${r.specialization?'📚 '+r.specialization:''}
            ${r.passing_month&&r.passing_year?' · 📅 '+MONTHS[r.passing_month]+' '+r.passing_year:''}
            ${r.grade_percentage?' · 🏅 '+r.grade_percentage:''}
          </div>
        </div>
        ${isHR?`<div style="display:flex;gap:6px">
          <button class="btn btn-outline btn-sm" onclick="editQual(${r.id})">✏️</button>
          <button class="btn btn-danger btn-sm" onclick="deleteQual(${r.id})">🗑</button>
        </div>`:''}
      </div>
    </div>`).join('');
}

function openQualModal(r={}) {
  const isEdit = !!r.id;
  document.getElementById('q-modal-title').textContent = isEdit ? '🎓 Edit Qualification' : '🎓 Add Qualification';
  ['q-id','q-qual','q-degree','q-specialization','q-institute','q-board','q-mode','q-state','q-grade','q-month','q-year','q-achievements','q-remarks'].forEach(id => {
    const keyMap = {'q-id':'id','q-qual':'qualification','q-degree':'degree','q-specialization':'specialization',
      'q-institute':'institute_name','q-board':'board_university','q-mode':'mode_of_education',
      'q-state':'state_location','q-grade':'grade_percentage','q-month':'passing_month','q-year':'passing_year',
      'q-achievements':'academic_achievements','q-remarks':'remarks'};
    const el = document.getElementById(id);
    if (el) el.value = r[keyMap[id]]||'';
  });
  document.getElementById('q-highest').checked = !!r.is_highest;
  openModal('qual-modal');
}

function editQual(id) { openQualModal(_qualData.find(r=>r.id===id)||{}); }

async function deleteQual(id) {
  if (!confirm('Delete this qualification?')) return;
  const d = await api('DELETE', `/qualifications/${id}`);
  if (d?.success) { toast('Deleted','success'); loadQualifications(); } else toast('Failed','error');
}

async function saveQual() {
  const btn = document.getElementById('q-save-btn');
  btn.disabled=true; btn.textContent='⏳ Saving…';
  const body = {
    id: document.getElementById('q-id').value||undefined,
    employee_id: currentEmployeeId,
    qualification: document.getElementById('q-qual').value,
    degree: document.getElementById('q-degree').value.trim(),
    specialization: document.getElementById('q-specialization').value.trim(),
    institute_name: document.getElementById('q-institute').value.trim(),
    board_university: document.getElementById('q-board').value.trim(),
    mode_of_education: document.getElementById('q-mode').value,
    state_location: document.getElementById('q-state').value.trim(),
    grade_percentage: document.getElementById('q-grade').value.trim(),
    passing_month: document.getElementById('q-month').value||null,
    passing_year: document.getElementById('q-year').value||null,
    academic_achievements: document.getElementById('q-achievements').value.trim(),
    remarks: document.getElementById('q-remarks').value.trim(),
    is_highest: document.getElementById('q-highest').checked,
  };
  const d = await api('POST', '/qualifications', body);
  btn.disabled=false; btn.textContent='💾 Save';
  if (d?.success) { toast('Saved ✅','success'); closeModal('qual-modal'); loadQualifications(); }
  else toast(d?.message||'Failed','error');
}
</script>

  </div>
</div>

<div class="modal-backdrop" id="qual-modal">
  <div class="modal" style="width:580px;max-height:90vh">

      <button class="modal-close" onclick="closeModal('qual-modal')">✕</button></div>
    <div class="modal-body" style="overflow-y:auto;max-height:65vh">
      <input type="hidden" id="q-id">
      <div style="display:grid;grid-template-columns:1fr 1fr;gap:14px">
        <div class="form-group"><label class="form-label">Qualification *</label>
          <select id="q-qual" class="form-control"><option value="">--Select--</option>
            <option>10th</option><option>12th</option><option>Diploma</option>
            <option>Bachelor's Degree</option><option>Master's Degree</option>
            <option>PhD</option><option>Certification</option><option>Other</option></select></div>

        <div class="form-group"><label class="form-label">Mode of Education</label>
          <select id="q-mode" class="form-control"><option value="">--Select--</option>
            <option>Regular</option><option>Distance</option><option>Online</option><option>Part Time</option></select></div>
        <div class="form-group"><label class="form-label">State / Location</label><input id="q-state" class="form-control"></div>
        <div class="form-group"><label class="form-label">Grade / %</label><input id="q-grade" class="form-control" placeholder="e.g. 75%"></div>

          <select id="q-month" class="form-control"><option value="">--Select--</option>
            <option value="1">January</option><option value="2">February</option><option value="3">March</option>
            <option value="4">April</option><option value="5">May</option><option value="6">June</option>
            <option value="7">July</option><option value="8">August</option><option value="9">September</option>
            <option value="10">October</option><option value="11">November</option><option value="12">December</option></select></div>
        <div class="form-group"><label class="form-label">Passing Year</label>
          <select id="q-year" class="form-control"><option value="">--Select--</option>
            ${Array.from({length:40},(_,i)=>new Date().getFullYear()-i).map(y=>`<option value="${y}">${y}</option>`).join('')}</select></div>
        <div class="form-group" style="grid-column:1/-1"><label class="form-label">Academic Achievements</label><textarea id="q-achievements" class="form-control" rows="2"></textarea></div>
        <div class="form-group" style="grid-column:1/-1"><label class="form-label">Remarks</label><textarea id="q-remarks" class="form-control" rows="2"></textarea></div>
        <div class="form-group"><label style="display:flex;align-items:center;gap:8px;cursor:pointer"><input type="checkbox" id="q-highest"> Highest Qualification</label></div>
