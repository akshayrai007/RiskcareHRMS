<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"><meta name="viewport" content="width=device-width,initial-scale=1">
<title id="page-title">My Payslip</title>
<script src="config.js"></script>
<link href="https://fonts.googleapis.com/css2?family=DM+Sans:ital,opsz,wght@0,9..40,300;0,9..40,400;0,9..40,500;0,9..40,600;0,9..40,700;0,9..40,800;1,9..40,400&display=swap" rel="stylesheet">
<link rel="stylesheet" href="style.css">
<style>
@media print {
  .sidebar, .topbar, .no-print { display: none !important; }
  .main { margin-left: 0 !important; }
  .content { padding: 0 !important; }
  @page { size: A4 portrait; margin: 10mm 8mm; }
  #payslip-area > div { max-width: 100% !important; }
}
</style>
</head>
<body>
<div class="sidebar-overlay" id="sidebar-overlay" onclick="closeSidebar()"></div>
<aside class="sidebar">
  <div class="sidebar-logo">
    <div class="logo-mark" id="sidebar-logo-mark">
      <svg class="logo-mark-icon" viewBox="0 0 24 24"><path d="M12 2L2 7l10 5 10-5-10-5zM2 17l10 5 10-5M2 12l10 5 10-5"/></svg>
    </div>
    <div>
      <div class="logo-text-wrap"><div class="logo-text" id="sidebar-logo-text"></div><div class="logo-sub" id="sidebar-company-short" style="display:none"></div></div>
    </div>
  </div>
  <nav id="sidebar-nav"></nav>
  <div class="sidebar-footer">
    <div id="sidebar-user"></div>
    <button class="logout-btn" onclick="Auth.logout()">
      <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"><path d="M9 21H5a2 2 0 0 1-2-2V5a2 2 0 0 1 2-2h4"/><polyline points="16,17 21,12 16,7"/><line x1="21" y1="12" x2="9" y2="12"/></svg>
      Sign Out
    </button>
  </div>
</aside>

<div class="main">
  <div class="topbar">
    <div class="topbar-left">
      <button class="hamburger-btn" onclick="toggleSidebar()" aria-label="Menu"><span></span><span></span><span></span></button>
      <div class="topbar-title">My Payslip</div>
    </div>
    <div class="topbar-right">
      <button class="btn btn-outline btn-sm no-print" onclick="window.print()" id="print-btn" style="display:none">🖨 Print / Download PDF</button>
      <button id="notif-bell-btn" class="topbar-icon-btn notif-btn" title="Notifications">🔔<span id="notif-badge"></span></button>
      <a class="topbar-icon-btn" href="dashboard.html" title="Dashboard">🏠</a>
    </div>
  </div>

  <div class="content fade-in">

    <!-- Month Selector -->
    <div class="card no-print" style="padding:16px 22px;margin-bottom:20px">
      <div class="flex gap-3" style="align-items:flex-end;flex-wrap:wrap">
        <div>
          <div class="form-label">Month</div>
          <select id="ps-month" class="form-control" style="width:150px"></select>
        </div>
        <div>
          <div class="form-label">Year</div>
          <select id="ps-year" class="form-control" style="width:100px"></select>
        </div>
        <button class="btn btn-primary" onclick="loadPayslip()">Load Payslip</button>
        <div id="available-months" style="flex:1"></div>
      </div>
    </div>

    <!-- Payslip Render Area -->
    <div id="payslip-area">
      <div class="empty-state">
        <div class="empty-icon">💰</div>
        <p>Select a month above and click <b>Load Payslip</b> to view your salary details.</p>
      </div>
    </div>

  </div>
</div>

<script src="config.js"></script>
<script src="app.js"></script>
<script>
// ── Apply CFG identity ─────────────────────────────────────────────────────
document.getElementById('page-title').textContent = window.CFG.clientName + ' - My Payslip';
document.getElementById('sidebar-logo-text').innerHTML = window.CFG.logoHtml;
var _cs=document.getElementById('sidebar-company-sub')||document.getElementById('sidebar-company-short'); if(_cs) _cs.textContent=window.CFG.companyShortName||'';

Auth.guard();
buildSidebar('payslip.html');
loadNotifBadge();

const NOW = new Date();

// Populate selectors
const monthSel = document.getElementById('ps-month');
const yearSel  = document.getElementById('ps-year');
fmt.months.forEach((m,i) => monthSel.innerHTML += `<option value="${i+1}" ${i+1===NOW.getMonth()+1?'selected':''}>${m}</option>`);
for (let y = NOW.getFullYear(); y >= 2020; y--)
  yearSel.innerHTML += `<option value="${y}" ${y===NOW.getFullYear()?'selected':''}>${y}</option>`;

// Load available payslip months
loadAvailableMonths();

async function loadAvailableMonths() {
  const data = await api('GET', '/my/payslip-months');
  if (!data?.success || !data.data?.length) return;
  const el = document.getElementById('available-months');
  el.innerHTML = `<div style="font-size:12px;color:var(--muted);margin-bottom:6px;font-weight:600">Available Payslips:</div>
    <div style="display:flex;gap:6px;flex-wrap:wrap">
      ${data.data.slice(0,12).map(p => `
        <button class="btn btn-outline btn-sm" onclick="quickLoad(${p.month},${p.year})" style="font-size:11px;padding:4px 10px">
          ${fmt.months[p.month-1].slice(0,3)} ${p.year}
          <span class="badge badge-${p.status}" style="font-size:9px;margin-left:4px">${p.status}</span>
        </button>`).join('')}
    </div>`;
}

function quickLoad(month, year) {
  document.getElementById('ps-month').value = month;
  document.getElementById('ps-year').value  = year;
  loadPayslip();
}

async function loadPayslip() {
  const month = document.getElementById('ps-month').value;
  const year  = document.getElementById('ps-year').value;
  const el    = document.getElementById('payslip-area');
  el.innerHTML = '<div class="loader"><div class="spinner"></div></div>';

  const data = await api('GET', `/my/payslip?month=${month}&year=${year}`);
  if (!data?.success) {
    el.innerHTML = `<div class="empty-state"><div class="empty-icon">📄</div>
      <p>No payslip found for ${fmt.months[month-1]} ${year}.</p>
      <p class="text-muted" style="margin-top:8px;font-size:13px">Payroll may not have been processed yet for this month.<br>Contact your HR department.</p>
    </div>`;
    document.getElementById('print-btn').style.display = 'none';
    return;
  }

  const p = data.data;
  el.innerHTML = renderPayslip(p);
  document.getElementById('print-btn').style.display = 'flex';
}

function renderPayslip(p) {
  const gross    = parseFloat(p.gross_salary || 0);
  const pfEmp    = parseFloat(p.pf_employee  || 0);
  const pfEmpr   = parseFloat(p.pf_employer  || pfEmp);
  const pfAdmin  = parseFloat(p.pf_admin     || (pfEmp ? Math.round(pfEmp * 0.005/0.12) : 0));
  const esiEmp   = parseFloat(p.esi_employee || 0);
  const esiEmpr  = parseFloat(p.esi_employer || 0);
  const pt       = parseFloat(p.professional_tax || 0);  // use exact DB value, no auto-derive
  const tds      = parseFloat(p.tds          || 0);
  const lwf      = parseFloat(p.lwf          || 0);
  const loanEmi  = parseFloat(p.loan_emi_recovery || 0);

  // Employee deductions (taken from salary)
  const empDedTotal = pfEmp + esiEmp + pt + tds + loanEmi;
  // Employer contributions (shown below gross, not deducted from net)
  const emprContrib = pfEmpr + esiEmpr + pfAdmin;
  const totalEarning = gross + emprContrib;  // matches reference "Total Earning"
  const totalDed     = empDedTotal + emprContrib;
  const netPay       = gross - empDedTotal;  // Net = gross minus employee deductions only

  const wDays     = parseInt(p.working_days || 26);
  const presentDays = parseFloat(p.present_days || wDays);
  const lopDays   = parseFloat(p.lop_days || 0);
  const mon       = fmt.months[parseInt(p.month)-1] + ' ' + p.year;

  const dob = p.date_of_birth ? new Date(p.date_of_birth).toLocaleDateString(window.CFG.currencyLocale,{day:'2-digit',month:'short',year:'numeric'}).replace(/ /g,'-') : '—';
  const doj = p.joining_date  ? new Date(p.joining_date).toLocaleDateString(window.CFG.currencyLocale,{day:'2-digit',month:'short',year:'numeric'}).replace(/ /g,'-') : '—';
  const location = [p.city, p.state].filter(Boolean).join(', ') || window.CFG.companyCity;

  const Rs = v => v > 0 ? parseFloat(v).toLocaleString(window.CFG.currencyLocale) : '-';

  // Build earnings rows
  const earningItems = [
    ['Basic Salary',       parseFloat(p.basic || 0)],
    ['HRA',                parseFloat(p.hra   || 0)],
    ['Conveyance Allowance', parseFloat(p.conveyance || p.travel_allowance || 0)],
    ['Gratuity',           parseFloat(p.gratuity || 0)],
    ['Other Allowance',    parseFloat(p.special_allowance || 0)],
  ].filter(r => r[1] > 0);

  // Build deduction rows — employee deductions first, then employer contributions
  const dedItems = [
    ['Provident Fund - Employee contribution', pfEmp],
    ['Professional Tax',   pt],
    ['TDS',                tds],
    ['EMI Recovery',       loanEmi],
    ['ESI - Employee',     esiEmp],
  ].filter(r => r[1] > 0);

  const emprItems = [
    ['Provident Fund - Employer contribution', pfEmpr],
    ['Admin Charges',      pfAdmin],
    ['ESI - Employer',     esiEmpr],
  ].filter(r => r[1] > 0);

  const allDedItems = [...dedItems, ...emprItems];

  const maxRows = Math.max(earningItems.length + 1, allDedItems.length + 1); // +1 for gross/total row
  let tableRows = '';

  for (let i = 0; i < Math.max(earningItems.length, allDedItems.length); i++) {
    const e = earningItems[i];
    const d = allDedItems[i];
    const isSep = i === dedItems.length && emprItems.length > 0; // separator before employer contrib
    tableRows += '<tr>'
      + '<td style="padding:6px 10px;font-size:14px;border:1px solid #ccc">' + (e ? e[0] : '') + '</td>'
      + '<td style="padding:6px 10px;font-size:14px;border:1px solid #ccc;text-align:center">' + (e ? Rs(e[1]) : '') + '</td>'
      + '<td style="padding:6px 10px;font-size:14px;border:1px solid #ccc' + (isSep ? ';border-top:2px solid #888' : '') + '">' + (d ? d[0] : '') + '</td>'
      + '<td style="padding:6px 10px;font-size:14px;border:1px solid #ccc;text-align:center' + (isSep ? ';border-top:2px solid #888' : '') + '">' + (d ? Rs(d[1]) : '') + '</td>'
      + '</tr>';
  }

  const C = window.CFG;
  return '<div style="font-family:Arial,\'Helvetica Neue\',sans-serif;background:#fff !important;color:#111 !important;max-width:794px;margin:0 auto;border:2px solid '+C.accentColor+' !important;padding:0;box-shadow:0 2px 12px rgba(0,0,0,.08)">'

  // ── HEADER ──
  + '<table style="width:100%;border-collapse:collapse;border-bottom:2px solid '+C.accentColor+' !important">'
  + '<tr>'
  + '<td style="padding:16px 20px;width:15%;vertical-align:middle;background:'+C.activeCardBg+' !important;border:none;">'
  + (C.logoUrl ? '<img src="'+C.logoUrl+'" style="max-width:80px;max-height:60px;object-fit:contain;" alt="'+C.clientName+' logo">' : '')
  + '</td>'
  + '<td style="padding:16px 20px;text-align:center;vertical-align:middle;background:'+C.activeCardBg+';">'
  + '<div style="font-size:19px;font-weight:800;color:#000;letter-spacing:0.2px;text-align:center;">'+C.companyFullName+'</div>'
  + '<div style="font-size:13px;margin-top:6px;color:#222;text-align:center;">Office Address: '+C.companyOfficeAddr+'</div>'
  + '</td>'
  + '</tr>'
  + '</table>'

  // ── TITLE BAR ──
  + '<div style="text-align:center;padding:10px;border-bottom:2px solid '+C.accentColor+';font-size:15px;font-weight:700;background:'+C.paleColor+';color:#000;">'
  + 'Pay Slip For The Month Of - ' + mon
  + '</div>'

  // ── EMPLOYEE INFO TABLE ──
  + '<table style="width:100%;border-collapse:collapse;border-bottom:1.5px solid #bbb">'
  + '<tr>'
  + '<td style="padding:5px 10px;width:16%;font-size:14px;font-weight:700;border:1px solid #ccc;background:'+C.activeCardBg+';color:'+C.primaryColor+'">Name</td>'
  + '<td style="padding:5px 10px;width:34%;font-size:14px;border:1px solid #ccc;text-align:center">' + (p.employee_name||'—') + '</td>'
  + '<td style="padding:5px 10px;width:16%;font-size:14px;font-weight:700;border:1px solid #ccc;background:'+C.activeCardBg+';color:'+C.primaryColor+'">Designation</td>'
  + '<td style="padding:5px 10px;width:34%;font-size:14px;border:1px solid #ccc;text-align:center">' + (p.designation_title||'—') + '</td>'
  + '</tr><tr>'
  + '<td style="padding:5px 10px;font-size:14px;font-weight:700;border:1px solid #ccc;background:'+C.activeCardBg+';color:'+C.primaryColor+'">EMP ID</td>'
  + '<td style="padding:5px 10px;font-size:14px;font-family:monospace;border:1px solid #ccc;text-align:center">' + (p.employee_code||'—') + '</td>'
  + '<td style="padding:5px 10px;font-size:14px;font-weight:700;border:1px solid #ccc;background:'+C.activeCardBg+';color:'+C.primaryColor+'">Department</td>'
  + '<td style="padding:5px 10px;font-size:14px;border:1px solid #ccc;text-align:center">' + (p.department_name||'—') + '</td>'
  + '</tr><tr>'
  + '<td style="padding:5px 10px;font-size:14px;font-weight:700;border:1px solid #ccc;background:'+C.activeCardBg+';color:'+C.primaryColor+'">U.A.N</td>'
  + '<td style="padding:5px 10px;font-size:14px;font-family:monospace;border:1px solid #ccc;text-align:center">' + (p.uan_number||'—') + '</td>'
  + '<td style="padding:5px 10px;font-size:14px;font-weight:700;border:1px solid #ccc;background:'+C.activeCardBg+';color:'+C.primaryColor+'">EMP D.O.J</td>'
  + '<td style="padding:5px 10px;font-size:14px;border:1px solid #ccc;text-align:center">' + doj + '</td>'
  + '</tr><tr>'
  + '<td style="padding:5px 10px;font-size:14px;font-weight:700;border:1px solid #ccc;background:'+C.activeCardBg+';color:'+C.primaryColor+'">PF No.</td>'
  + '<td style="padding:5px 10px;font-size:14px;font-family:monospace;border:1px solid #ccc;text-align:center">' + (p.pf_number||'—') + '</td>'
  + '<td style="padding:5px 10px;font-size:14px;font-weight:700;border:1px solid #ccc;background:'+C.activeCardBg+';color:'+C.primaryColor+'">Location</td>'
  + '<td style="padding:5px 10px;font-size:14px;border:1px solid #ccc;text-align:center">' + location + '</td>'
  + '</tr><tr>'
  + '<td style="padding:5px 10px;font-size:14px;font-weight:700;border:1px solid #ccc;background:'+C.activeCardBg+';color:'+C.primaryColor+'">EMP Pan</td>'
  + '<td style="padding:5px 10px;font-size:14px;font-family:monospace;border:1px solid #ccc;text-align:center">' + (p.pan_number||'—') + '</td>'
  + '<td style="padding:5px 10px;font-size:14px;font-weight:700;border:1px solid #ccc;background:'+C.activeCardBg+';color:'+C.primaryColor+'">Day\'s Worked</td>'
  + '<td style="padding:5px 10px;font-size:14px;border:1px solid #ccc;text-align:center">' + presentDays + '</td>'
  + '</tr><tr>'
  + '<td style="padding:5px 10px;font-size:14px;font-weight:700;border:1px solid #ccc;background:'+C.activeCardBg+';color:'+C.primaryColor+'">EMP D.O.B</td>'
  + '<td style="padding:5px 10px;font-size:14px;border:1px solid #ccc;text-align:center">' + dob + '</td>'
  + '<td style="padding:5px 10px;font-size:14px;font-weight:700;border:1px solid #ccc;background:'+C.activeCardBg+';color:'+C.primaryColor+'">Days in Month</td>'
  + '<td style="padding:5px 10px;font-size:14px;border:1px solid #ccc;text-align:center">' + new Date(parseInt(p.year), parseInt(p.month), 0).getDate() + '</td>'
  + '</tr><tr>'
  + '<td style="padding:5px 10px;font-size:14px;font-weight:700;border:1px solid #ccc;background:'+C.activeCardBg+' !important;color:'+C.primaryColor+' !important">A/C Number</td>'
  + '<td style="padding:5px 10px;font-size:14px;font-family:monospace;border:1px solid #ccc;text-align:center">' + (p.bank_account||'—') + '</td>'
  + '<td style="padding:5px 10px;font-size:14px;font-weight:700;border:1px solid #ccc;background:'+C.activeCardBg+' !important;color:'+C.primaryColor+' !important">LWP</td>'
  + '<td style="padding:5px 10px;font-size:14px;border:1px solid #ccc;text-align:center">' + (lopDays > 0 ? lopDays : '-') + '</td>'
  + '</tr><tr>'
  + '<td style="padding:5px 10px;font-size:14px;font-weight:700;border:1px solid #ccc;background:'+C.activeCardBg+' !important;color:'+C.primaryColor+' !important">Bank</td>'
  + '<td style="padding:5px 10px;font-size:14px;border:1px solid #ccc;text-align:center">' + (p.bank_name||'—') + '</td>'
  + '<td style="padding:5px 10px;font-size:14px;font-weight:700;border:1px solid #ccc;background:'+C.activeCardBg+' !important;color:'+C.primaryColor+' !important">IFSC</td>'
  + '<td style="padding:5px 10px;font-size:14px;font-family:monospace;border:1px solid #ccc;text-align:center">' + (p.bank_ifsc||'—') + '</td>'
  + '</tr>'
  + '</table>'

  // ── EARNINGS & DEDUCTIONS HEADER ──
  + '<table style="width:100%;border-collapse:collapse">'
  + '<tr style="background:#f5f5f5">'
  + '<td colspan="2" style="padding:7px 10px;font-size:13px;font-weight:700;text-align:center;border:1px solid #ccc;width:50%;background:'+C.borderColor+' !important;color:'+C.primaryColor+' !important">Earnings</td>'
  + '<td colspan="2" style="padding:7px 10px;font-size:13px;font-weight:700;text-align:center;border:1px solid #ccc;width:50%;background:#FFCDD2 !important;color:#B71C1C !important">Deductions</td>'
  + '</tr>'
  + '<tr style="background:'+C.subHeaderBg+'">'
  + '<td style="padding:7px 10px;font-size:14px;font-weight:700;border:1px solid #ccc;width:34%">Particulars</td>'
  + '<td style="padding:7px 10px;font-size:14px;font-weight:700;border:1px solid #ccc;width:16%;text-align:center">'+C.currencySymbol+'</td>'
  + '<td style="padding:7px 10px;font-size:14px;font-weight:700;border:1px solid #ccc;width:34%">Particulars</td>'
  + '<td style="padding:7px 10px;font-size:14px;font-weight:700;border:1px solid #ccc;width:16%;text-align:center">'+C.currencySymbol+'</td>'
  + '</tr>'
  + tableRows
  // Gross Pay / blank row
  + '<tr style="background:'+C.paleColor+' !important">'
  + '<td style="padding:7px 10px;font-size:14px;font-weight:700;border:1px solid #ccc;color:#000 !important">Gross Pay</td>'
  + '<td style="padding:6px 10px;font-size:14px;font-weight:700;border:1px solid #ccc;text-align:center">' + Rs(gross) + '</td>'
  + '<td style="padding:6px 10px;font-size:14px;border:1px solid #ccc"></td>'
  + '<td style="padding:6px 10px;font-size:14px;border:1px solid #ccc"></td>'
  + '</tr>'
  // Spacer rows (to match reference visual)
  + '<tr><td style="padding:3px 10px;border:1px solid #ccc" colspan="4"></td></tr>'
  // Total Earning / Total Deductions
  + '<tr style="background:#f5f5f5">'
  + '<td style="padding:7px 10px;font-size:14px;font-weight:700;border:1px solid #ccc;background:'+C.activeCardBg+' !important;color:'+C.primaryColor+' !important">Total Earning</td>'
  + '<td style="padding:6px 10px;font-size:14px;font-weight:700;border:1px solid #ccc;text-align:center">' + Rs(totalEarning) + '</td>'
  + '<td style="padding:7px 10px;font-size:14px;font-weight:700;border:1px solid #ccc;background:#FFEBEE !important;color:#B71C1C !important">Total Deductions</td>'
  + '<td style="padding:6px 10px;font-size:14px;font-weight:700;border:1px solid #ccc;text-align:center">' + Rs(totalDed) + '</td>'
  + '</tr>'
  + '</table>'

  // ── NET SALARY ──
  + '<table style="width:100%;border-collapse:collapse;border-top:1.5px solid #bbb">'
  + '<tr>'
  + '<td style="padding:9px 10px;font-size:13px;font-weight:700;border:2px solid '+C.accentColor+' !important;width:34%;background:'+C.accentColor+' !important;color:#fff !important">Net Salary ('+C.currencySymbol+')</td>'
  + '<td style="padding:9px 10px;font-size:14px;font-weight:800;border:2px solid '+C.accentColor+' !important;text-align:center;background:'+C.paleColor+' !important;color:'+C.primaryColor+' !important" colspan="3">' + Rs(netPay) + '</td>'
  + '</tr>'
  + '</table>'

  // ── FOOTER ──
  + '<div style="padding:10px 12px;font-size:11px;color:#555;font-style:italic">'
  + 'It is computer generated statement signature is not required.'
  + '</div>'
  + '</div>';
}

function numberToWords(amount) {
  if (!amount || isNaN(amount)) return 'Zero ' + window.CFG.currencyWord;
  const a = ['','One','Two','Three','Four','Five','Six','Seven','Eight','Nine','Ten','Eleven','Twelve','Thirteen','Fourteen','Fifteen','Sixteen','Seventeen','Eighteen','Nineteen'];
  const b = ['','','Twenty','Thirty','Forty','Fifty','Sixty','Seventy','Eighty','Ninety'];
  function inWords(n) {
    if (n < 20) return a[n];
    if (n < 100) return b[Math.floor(n/10)] + (n%10?' '+a[n%10]:'');
    if (n < 1000) return a[Math.floor(n/100)] + ' Hundred' + (n%100?' '+inWords(n%100):'');
    if (n < 100000) return inWords(Math.floor(n/1000)) + ' Thousand' + (n%1000?' '+inWords(n%1000):'');
    if (n < 10000000) return inWords(Math.floor(n/100000)) + ' Lakh' + (n%100000?' '+inWords(n%100000):'');
    return inWords(Math.floor(n/10000000)) + ' Crore' + (n%10000000?' '+inWords(n%10000000):'');
  }
  const rupees = Math.floor(parseFloat(amount));
  return (inWords(rupees)||'Zero') + ' ' + window.CFG.currencyWord;
}
</script>
</body>
</html>
